<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3d-explorer — first-person walk</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
      }
      canvas {
        display: block;
      }
      #lock-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #f5f5f5;
        font: 16px/1.4 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
        user-select: none;
        z-index: 10;
      }
      #lock-overlay h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }
      #lock-overlay p {
        margin: 0;
        opacity: 0.85;
      }
      #lock-overlay.hidden {
        display: none;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 14px;
        height: 14px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: #fff;
        box-shadow: 0 0 0 1px #000;
      }
      #crosshair::before {
        top: 50%;
        left: 0;
        width: 100%;
        height: 2px;
        margin-top: -1px;
      }
      #crosshair::after {
        top: 0;
        left: 50%;
        width: 2px;
        height: 100%;
        margin-left: -1px;
      }
      #cam-indicator {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 4px 8px;
        font: 12px/1 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 3px;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #info-card {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        font: 13px/1.5 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 4px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #catalog-counter {
        position: fixed;
        top: 8px;
        right: 8px;
        padding: 4px 8px;
        font: 12px/1 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 3px;
        pointer-events: none;
        user-select: none;
        z-index: 5;
      }
      #target-toast {
        position: fixed;
        top: 32px;
        right: 8px;
        padding: 6px 10px;
        font: 12px/1.4 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 4px;
        white-space: pre-line;
        text-align: right;
        max-width: 320px;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #crosshair.visible,
      #cam-indicator.visible,
      #info-card.visible,
      #target-toast.visible {
        display: block;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="lock-overlay">
      <h1>Click to play</h1>
      <p>WASD / arrows to move &middot; Shift to sprint &middot; Space to jump &middot; R to randomize &middot; C to toggle camera &middot; mouse to look &middot; ESC to release</p>
    </div>
    <div id="crosshair"></div>
    <div id="cam-indicator">CAM ON</div>
    <div id="info-card"></div>
    <div id="catalog-counter">Captured 0 / 0</div>
    <div id="target-toast"></div>
    <script type="module">
      import * as THREE from 'three';
      import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        200,
      );
      camera.position.set(0, 1.6, 5);
      camera.lookAt(0, 1.6, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();
      document.body.appendChild(renderer.domElement);

      const terrainMaterial = new THREE.MeshStandardMaterial({
        color: 0x202428,
        roughness: 0.9,
        metalness: 0.0,
      });
      const terrainMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), terrainMaterial);
      scene.add(terrainMesh);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);
      const sun = new THREE.DirectionalLight(0xffffff, 1.0);
      sun.position.set(3, 4, 2);
      scene.add(sun);

      const DAY_LENGTH = 60;
      const SKY_RADIUS = 80;
      const SUN_DISTANCE = 75;
      const STAR_RADIUS = 76;
      const STAR_COUNT = 500;

      const skyTopColor = new THREE.Color();
      const skyHorizonColor = new THREE.Color();
      const skyMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTopColor: { value: skyTopColor },
          uHorizonColor: { value: skyHorizonColor },
        },
        vertexShader: /* glsl */ `
          varying vec3 vWorldDir;
          void main() {
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldDir = normalize(worldPos.xyz - cameraPosition);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
          }
        `,
        fragmentShader: /* glsl */ `
          varying vec3 vWorldDir;
          uniform vec3 uTopColor;
          uniform vec3 uHorizonColor;
          void main() {
            float h = smoothstep(0.0, 0.5, normalize(vWorldDir).y);
            gl_FragColor = vec4(mix(uHorizonColor, uTopColor, h), 1.0);
          }
        `,
        side: THREE.BackSide,
        depthWrite: false,
      });
      const skyDome = new THREE.Mesh(new THREE.SphereGeometry(SKY_RADIUS, 32, 16), skyMaterial);
      skyDome.renderOrder = -2;
      scene.add(skyDome);

      const sunDisc = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xffe9a8, depthWrite: false, fog: false }),
      );
      sunDisc.renderOrder = -1;
      scene.add(sunDisc);

      const moonDisc = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xddddee, depthWrite: false, fog: false }),
      );
      moonDisc.renderOrder = -1;
      scene.add(moonDisc);

      const starMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uOpacity: { value: 0 },
          uPixelRatio: { value: renderer.getPixelRatio() },
        },
        vertexShader: /* glsl */ `
          attribute float aPhase;
          attribute float aFrequency;
          attribute float aSize;
          uniform float uTime;
          uniform float uPixelRatio;
          varying float vTwinkle;
          void main() {
            vTwinkle = 0.65 + 0.35 * sin(uTime * aFrequency + aPhase);
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = aSize * uPixelRatio;
            gl_Position = projectionMatrix * mvPos;
          }
        `,
        fragmentShader: /* glsl */ `
          uniform float uOpacity;
          varying float vTwinkle;
          void main() {
            vec2 c = gl_PointCoord - vec2(0.5);
            if (dot(c, c) > 0.25) discard;
            gl_FragColor = vec4(1.0, 1.0, 1.0, uOpacity * vTwinkle);
          }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      function createStars() {
        const starRng = mulberry32(0xc0ffee);
        const positions = new Float32Array(STAR_COUNT * 3);
        const phases = new Float32Array(STAR_COUNT);
        const frequencies = new Float32Array(STAR_COUNT);
        const sizes = new Float32Array(STAR_COUNT);
        for (let i = 0; i < STAR_COUNT; i++) {
          const u = starRng();
          const v = starRng();
          const phi = 2 * Math.PI * u;
          const cosTheta = 2 * v - 1;
          const sinTheta = Math.sqrt(1 - cosTheta * cosTheta);
          positions[i * 3 + 0] = STAR_RADIUS * sinTheta * Math.cos(phi);
          positions[i * 3 + 1] = STAR_RADIUS * cosTheta;
          positions[i * 3 + 2] = STAR_RADIUS * sinTheta * Math.sin(phi);
          phases[i] = starRng() * Math.PI * 2;
          frequencies[i] = 0.5 + starRng() * 1.5;
          sizes[i] = 1.0 + starRng() * 2.0;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
        geometry.setAttribute('aFrequency', new THREE.BufferAttribute(frequencies, 1));
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
        const points = new THREE.Points(geometry, starMaterial);
        points.name = 'stars';
        points.renderOrder = -1;
        points.frustumCulled = false;
        return points;
      }

      const stars = createStars();
      scene.add(stars);

      const skyKeyframes = [
        { t: 0.0, top: new THREE.Color('#7891B8'), horizon: new THREE.Color('#FF9966') },
        { t: 0.25, top: new THREE.Color('#5BA3DD'), horizon: new THREE.Color('#B0D8F0') },
        { t: 0.5, top: new THREE.Color('#7891B8'), horizon: new THREE.Color('#FF7755') },
        { t: 0.75, top: new THREE.Color('#02061A'), horizon: new THREE.Color('#0F1B40') },
      ];
      const warmLightColor = new THREE.Color('#FFD09E');
      const whiteLightColor = new THREE.Color('#FFFFFF');
      const sunDir = new THREE.Vector3();

      function updateSkyColors(t) {
        const segments = skyKeyframes.length;
        let prevIdx = 0;
        for (let i = 0; i < segments; i++) {
          if (skyKeyframes[i].t <= t) prevIdx = i;
        }
        const prev = skyKeyframes[prevIdx];
        const next = skyKeyframes[(prevIdx + 1) % segments];
        const nextT = next.t > prev.t ? next.t : next.t + 1;
        const u = (t - prev.t) / (nextT - prev.t);
        skyTopColor.copy(prev.top).lerp(next.top, u);
        skyHorizonColor.copy(prev.horizon).lerp(next.horizon, u);
      }

      function mulberry32(a) {
        return function () {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function makeCanvas(size = 256) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        return canvas;
      }

      function createCheckerTexture() {
        const size = 256;
        const cells = 8;
        const cell = size / cells;
        const canvas = makeCanvas(size);
        const ctx = canvas.getContext('2d');
        ctx.filter = 'blur(1.0px)';
        for (let y = 0; y < cells; y++) {
          for (let x = 0; x < cells; x++) {
            ctx.fillStyle = (x + y) % 2 === 0 ? '#B0B0B0' : '#5C5C5C';
            ctx.fillRect(x * cell, y * cell, cell, cell);
          }
        }
        ctx.filter = 'none';
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = MAX_ANISO;
        return tex;
      }

      function createStripesTexture() {
        const size = 256;
        const canvas = makeCanvas(size);
        const ctx = canvas.getContext('2d');
        for (let x = 0; x < size; x++) {
          const v = 0.62 + 0.22 * Math.sin((x / size) * Math.PI * 8);
          const g = Math.round(v * 255);
          ctx.fillStyle = `rgb(${g}, ${g}, ${g})`;
          ctx.fillRect(x, 0, 1, size);
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = MAX_ANISO;
        return tex;
      }

      function createDotsTexture() {
        const size = 256;
        const cells = 6;
        const cell = size / cells;
        const radius = 11;
        const canvas = makeCanvas(size);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#C0C0C0';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#5A5A5A';
        for (let y = 0; y < cells; y++) {
          for (let x = 0; x < cells; x++) {
            const cx = x * cell + cell / 2;
            const cy = y * cell + cell / 2;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = MAX_ANISO;
        return tex;
      }

      function createNoiseTexture() {
        const size = 256;
        const small = makeCanvas(16);
        const smallCtx = small.getContext('2d');
        const img = smallCtx.createImageData(16, 16);
        const data = img.data;
        for (let i = 0; i < 16 * 16; i++) {
          const r = Math.random();
          const v = Math.round((0.45 + r * 0.40) * 255);
          data[i * 4 + 0] = v;
          data[i * 4 + 1] = v;
          data[i * 4 + 2] = v;
          data[i * 4 + 3] = 255;
        }
        smallCtx.putImageData(img, 0, 0);
        const canvas = makeCanvas(size);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(small, 0, 0, size, size);
        const tex = new THREE.CanvasTexture(canvas);
        tex.anisotropy = MAX_ANISO;
        return tex;
      }

      const baseTextures = [
        createCheckerTexture(),
        createStripesTexture(),
        createDotsTexture(),
        createNoiseTexture(),
      ];
      const TEXTURE_NAMES = ['checker', 'stripes', 'dots', 'noise'];

      const DEFAULT_FOV = 60;
      const MIN_FOV = 20;
      const MAX_FOV = 60;
      const HIGHLIGHT_DURATION = 0.6;
      const INFO_DURATION = 2.5;

      let cameraMode = false;
      let targetFov = DEFAULT_FOV;
      let infoTimer = 0;

      const aimNdc = new THREE.Vector2(0, 0);
      const raycaster = new THREE.Raycaster();

      const crosshairEl = document.getElementById('crosshair');
      const camIndicatorEl = document.getElementById('cam-indicator');
      const infoCardEl = document.getElementById('info-card');
      const catalogCounterEl = document.getElementById('catalog-counter');
      const targetToastEl = document.getElementById('target-toast');

      function showInfoCard(info) {
        infoCardEl.textContent =
          `shape: ${info.shape}\n` +
          `dims: ${info.dims}\n` +
          `color: ${info.colorHex}\n` +
          `material: rough=${info.roughness.toFixed(2)} metal=${info.metalness.toFixed(2)}\n` +
          `texture: ${info.textureName}`;
        infoCardEl.classList.add('visible');
        infoTimer = INFO_DURATION;
      }

      function hideInfoCard() {
        infoCardEl.classList.remove('visible');
        infoTimer = 0;
      }

      function updateCatalogCounter() {
        catalogCounterEl.textContent = `Captured ${capturedCount} / ${targets.length}`;
      }

      function showTargetToast(entry) {
        targetToastEl.textContent = `${entry.name}\n${entry.flavor}`;
        targetToastEl.classList.add('visible');
        targetToastTimer = INFO_DURATION;
      }

      function hideTargetToast() {
        targetToastEl.classList.remove('visible');
        targetToastTimer = 0;
      }

      const controls = new PointerLockControls(camera, document.body);
      const overlay = document.getElementById('lock-overlay');
      overlay.addEventListener('click', () => {
        controls.lock();
      });
      controls.addEventListener('lock', () => {
        overlay.classList.add('hidden');
      });
      controls.addEventListener('unlock', () => {
        overlay.classList.remove('hidden');
      });

      const keys = Object.create(null);
      let jumpQueued = false;
      let regenerateRequested = false;
      window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'Space' && !e.repeat) {
          jumpQueued = true;
        }
        if (e.code === 'KeyR' && !e.repeat) {
          regenerateRequested = true;
          hideInfoCard();
          hideTargetToast();
        }
        if (e.code === 'KeyC' && !e.repeat) {
          cameraMode = !cameraMode;
          crosshairEl.classList.toggle('visible', cameraMode);
          camIndicatorEl.classList.toggle('visible', cameraMode);
          if (!cameraMode) targetFov = DEFAULT_FOV;
        }
      });

      window.addEventListener(
        'wheel',
        (e) => {
          if (!cameraMode) return;
          e.preventDefault();
          targetFov = Math.max(
            MIN_FOV,
            Math.min(MAX_FOV, targetFov + Math.sign(e.deltaY) * 5),
          );
        },
        { passive: false },
      );

      window.addEventListener('mousedown', (e) => {
        if (!cameraMode || !controls.isLocked || e.button !== 0) return;
        raycaster.setFromCamera(aimNdc, camera);
        const hittables = props.map((p) => p.mesh).concat(targets.map((t) => t.mesh));
        const hits = raycaster.intersectObjects(hittables);
        if (hits.length === 0) return;
        const hitMesh = hits[0].object;
        const hitTarget = targets.find((t) => t.mesh === hitMesh);
        if (hitTarget) {
          if (!hitTarget.captured) captureTarget(hitTarget);
          return;
        }
        const hitProp = props.find((p) => p.mesh === hitMesh);
        if (!hitProp) return;
        hitProp.highlightT = HIGHLIGHT_DURATION;
        showInfoCard(hitProp.info);
      });
      window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      const WALK_SPEED = 5;
      const SPRINT_MULTIPLIER = 2;
      const JUMP_VELOCITY = 7.5;
      const GRAVITY = 25;
      const AIR_CONTROL = 0.5;
      const EYE_HEIGHT = 1.6;
      const HALF_EXTENT = 24.5;
      const PLAYER_RADIUS = 0.3;
      const SPAWN_X = 0;
      const SPAWN_Z = 5;
      const SPAWN_EXCLUSION_RADIUS = 2.5;
      const PUSH_EPS = 1e-3;
      const STEP_DOWN_TOLERANCE = 0.2;
      const TERRAIN_AMPLITUDE = 0.6;
      const TERRAIN_GRID = 16;
      const TERRAIN_SEGMENTS = 100;
      const SPAWN_FLAT_RADIUS = 3.5;
      const SPAWN_FALLOFF_RADIUS = 7.0;
      const FOG_NIGHT_NEAR = 6;
      const FOG_NIGHT_FAR = 30;
      const FOG_NOON_NEAR = 40;
      const FOG_NOON_FAR = 150;
      const FOG_NIGHT_THRESHOLD = -0.25;
      const FOG_DAY_THRESHOLD = 0.3;
      const POND_RADIUS = 5;
      const POND_FLOOR_Y = -2.5;
      const POND_WATER_LEVEL = -0.4;
      const POND_WATER_RADIUS = 3.6;
      const POND_PROP_KEEPOUT = 6.5;
      const POND_SPAWN_MIN_DIST = 13;
      const POND_PLACEMENT_HALF = 18;
      const POND_WAVE_AMPLITUDE = 0.03;
      const POND_BASE_COLOR = new THREE.Color('#2A5F8F');
      const POND_OPACITY = 0.75;
      const TREE_COUNT_MIN = 18;
      const TREE_COUNT_RANGE = 15;
      const TREE_TRUNK_RADIUS_MIN = 0.12;
      const TREE_TRUNK_RADIUS_RANGE = 0.12;
      const TREE_TRUNK_HEIGHT_MIN = 0.6;
      const TREE_TRUNK_HEIGHT_RANGE = 1.0;
      const TREE_FOLIAGE_RADIUS_MIN = 0.9;
      const TREE_FOLIAGE_RADIUS_RANGE = 0.7;
      const TREE_FOLIAGE_HEIGHT_MIN = 2.0;
      const TREE_FOLIAGE_HEIGHT_RANGE = 2.0;
      const TREE_SPAWN_EXCLUSION = 4.0;
      const TREE_POND_KEEPOUT = 6.5;
      const TREE_PROP_BUFFER = 0.4;
      const TREE_TREE_BUFFER = 0.4;
      const TREE_PLACEMENT_HALF = 22.0;
      const TREE_RADIAL_SEGMENTS = 8;
      const TREE_TRUNK_COLOR = new THREE.Color('#5C3A1E');
      const TREE_FOLIAGE_BASE_COLOR = new THREE.Color('#2F6B3A');
      const TREE_FOLIAGE_HUE_VARIANCE = 0.025;
      const TREE_FOLIAGE_LIGHT_VARIANCE = 0.05;
      const TREE_PLACEMENT_ATTEMPTS = 30;
      const TARGET_COUNT = 5;
      const TARGET_HOVER_Y = 1.2;
      const TARGET_RADIUS = 0.35;
      const TARGET_BOB_AMPLITUDE = 0.15;
      const TARGET_BOB_FREQUENCY = 1.2;
      const TARGET_SPAWN_EXCLUSION = 5.0;
      const TARGET_POND_KEEPOUT = 6.5;
      const TARGET_PROP_BUFFER = 0.5;
      const TARGET_TREE_BUFFER = 0.8;
      const TARGET_OTHER_BUFFER = 2.0;
      const TARGET_PLACEMENT_HALF = 22.0;
      const TARGET_PLACEMENT_ATTEMPTS = 30;
      const TARGET_CAPTURED_DIM = 0.2;
      const TARGET_CATALOG = [
        {
          name: 'Ember Octahedron',
          flavor: 'A fire-orange crystal humming with stored sunlight.',
          color: 0xff5533,
        },
        {
          name: 'Tidewatch Spire',
          flavor: 'Glacial-blue facets refracting an absent dawn.',
          color: 0x33ccff,
        },
        {
          name: 'Verdant Mote',
          flavor: 'A leaf-green shard pulsing in time with hidden roots.',
          color: 0x55ff66,
        },
        {
          name: 'Violet Compass',
          flavor: 'Tilts toward each new horizon with deliberate calm.',
          color: 0xaa55ff,
        },
        {
          name: 'Amber Echo',
          flavor: 'Holds the warmth of a long-forgotten summer.',
          color: 0xffcc33,
        },
      ];
      scene.fog = new THREE.Fog(0x000000, FOG_NIGHT_NEAR, FOG_NIGHT_FAR);
      const clock = new THREE.Clock();

      let velocityY = 0;
      let isGrounded = true;
      let airSpeed = WALK_SPEED;

      let seed = 1;
      let rng = mulberry32(seed);
      const props = [];
      const trees = [];
      const targets = [];
      let capturedCount = 0;
      let targetToastTimer = 0;
      let pondCenterX = 0;
      let pondCenterZ = 0;
      let pondMesh = null;

      const waterMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uHorizonColor: { value: skyHorizonColor },
          uBaseColor: { value: POND_BASE_COLOR },
          uOpacity: { value: POND_OPACITY },
          uWaveAmplitude: { value: POND_WAVE_AMPLITUDE },
        },
        vertexShader: /* glsl */ `
          uniform float uTime;
          uniform float uWaveAmplitude;
          varying vec3 vWorldPos;
          varying vec2 vUv;
          void main() {
            vec3 pos = position;
            pos.y += uWaveAmplitude * (
              sin(uTime * 1.5 + pos.x * 0.8)
              + cos(uTime * 1.2 + pos.z * 0.7)
            );
            vec4 worldPos = modelMatrix * vec4(pos, 1.0);
            vWorldPos = worldPos.xyz;
            vUv = uv;
            gl_Position = projectionMatrix * viewMatrix * worldPos;
          }
        `,
        fragmentShader: /* glsl */ `
          uniform vec3 uBaseColor;
          uniform vec3 uHorizonColor;
          uniform float uOpacity;
          uniform float uTime;
          varying vec3 vWorldPos;
          varying vec2 vUv;
          void main() {
            vec3 viewDir = normalize(cameraPosition - vWorldPos);
            float fresnel = pow(1.0 - max(viewDir.y, 0.0), 3.0);
            vec3 col = mix(uBaseColor, uHorizonColor, fresnel);
            float ripple = 0.5 + 0.5 * sin(uTime * 2.0 + vUv.x * 30.0)
                                      * cos(uTime * 1.5 + vUv.y * 30.0);
            col += 0.05 * ripple;
            gl_FragColor = vec4(col, uOpacity);
          }
        `,
        side: THREE.DoubleSide,
        transparent: true,
        depthWrite: false,
      });

      const trunkMaterial = new THREE.MeshStandardMaterial({
        color: TREE_TRUNK_COLOR,
        roughness: 0.9,
        metalness: 0.0,
      });

      function createPondMesh() {
        const geometry = new THREE.CircleGeometry(POND_WATER_RADIUS, 48);
        geometry.rotateX(-Math.PI / 2);
        const mesh = new THREE.Mesh(geometry, waterMaterial);
        mesh.position.set(pondCenterX, POND_WATER_LEVEL, pondCenterZ);
        mesh.renderOrder = 0;
        return mesh;
      }

      function disposeProps() {
        for (const prop of props) {
          scene.remove(prop.mesh);
          prop.mesh.geometry.dispose();
          if (prop.mesh.material.map) prop.mesh.material.map.dispose();
          prop.mesh.material.dispose();
        }
        props.length = 0;
      }

      function disposeTrees() {
        for (const tree of trees) {
          scene.remove(tree.trunkMesh);
          scene.remove(tree.foliageMesh);
          tree.trunkMesh.geometry.dispose();
          tree.foliageMesh.geometry.dispose();
          tree.foliageMaterial.dispose();
        }
        trees.length = 0;
      }

      function disposeTargets() {
        for (const target of targets) {
          scene.remove(target.mesh);
          target.mesh.geometry.dispose();
          target.mesh.material.dispose();
        }
        targets.length = 0;
      }

      const heightGrid = new Float32Array(TERRAIN_GRID * TERRAIN_GRID);

      function heightAt(x, z) {
        const gx = THREE.MathUtils.clamp(
          ((x + 25) / 50) * (TERRAIN_GRID - 1),
          0,
          TERRAIN_GRID - 1,
        );
        const gz = THREE.MathUtils.clamp(
          ((z + 25) / 50) * (TERRAIN_GRID - 1),
          0,
          TERRAIN_GRID - 1,
        );
        const x0 = Math.floor(gx);
        const z0 = Math.floor(gz);
        const x1 = Math.min(x0 + 1, TERRAIN_GRID - 1);
        const z1 = Math.min(z0 + 1, TERRAIN_GRID - 1);
        const fx = gx - x0;
        const fz = gz - z0;
        const fxs = fx * fx * (3 - 2 * fx);
        const fzs = fz * fz * (3 - 2 * fz);
        const v00 = heightGrid[z0 * TERRAIN_GRID + x0];
        const v10 = heightGrid[z0 * TERRAIN_GRID + x1];
        const v01 = heightGrid[z1 * TERRAIN_GRID + x0];
        const v11 = heightGrid[z1 * TERRAIN_GRID + x1];
        const v0 = v00 * (1 - fxs) + v10 * fxs;
        const v1 = v01 * (1 - fxs) + v11 * fxs;
        const raw = v0 * (1 - fzs) + v1 * fzs;
        const dx = x - SPAWN_X;
        const dz = z - SPAWN_Z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const mask = THREE.MathUtils.smoothstep(dist, SPAWN_FLAT_RADIUS, SPAWN_FALLOFF_RADIUS);
        const terrain = raw * TERRAIN_AMPLITUDE * mask;
        const pdx = x - pondCenterX;
        const pdz = z - pondCenterZ;
        const pondDist = Math.sqrt(pdx * pdx + pdz * pdz);
        if (pondDist >= POND_RADIUS) return terrain;
        const bowlT = 1 - THREE.MathUtils.smoothstep(pondDist, 0, POND_RADIUS);
        return THREE.MathUtils.lerp(terrain, POND_FLOOR_Y, bowlT);
      }

      function placePond(seedVal) {
        const pondRng = mulberry32(seedVal ^ 0xb0a7);
        for (let attempt = 0; attempt < 50; attempt++) {
          const x = -POND_PLACEMENT_HALF + pondRng() * 2 * POND_PLACEMENT_HALF;
          const z = -POND_PLACEMENT_HALF + pondRng() * 2 * POND_PLACEMENT_HALF;
          const dx = x - SPAWN_X;
          const dz = z - SPAWN_Z;
          if (dx * dx + dz * dz >= POND_SPAWN_MIN_DIST * POND_SPAWN_MIN_DIST) {
            pondCenterX = x;
            pondCenterZ = z;
            return;
          }
        }
        pondCenterX = -15;
        pondCenterZ = -10;
      }

      function buildTerrainGeometry(seedVal) {
        placePond(seedVal);
        const terrainRng = mulberry32(seedVal ^ 0xa11ce);
        for (let i = 0; i < TERRAIN_GRID * TERRAIN_GRID; i++) {
          heightGrid[i] = terrainRng() * 2 - 1;
        }
        const geometry = new THREE.PlaneGeometry(50, 50, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS);
        geometry.rotateX(-Math.PI / 2);
        const positions = geometry.attributes.position;
        for (let i = 0; i < positions.count; i++) {
          const vx = positions.getX(i);
          const vz = positions.getZ(i);
          positions.setY(i, heightAt(vx, vz));
        }
        geometry.computeVertexNormals();
        return geometry;
      }

      function generate(newSeed) {
        disposeProps();
        seed = newSeed;
        rng = mulberry32(seed);

        const targetCount = 15 + Math.floor(rng() * 16);
        for (let i = 0; i < targetCount; i++) {
          let placed = false;
          for (let attempt = 0; attempt < 30 && !placed; attempt++) {
            const shapeIdx = Math.floor(rng() * 4);
            const posX = -22 + rng() * 44;
            const posZ = -22 + rng() * 44;
            const baseY = heightAt(posX, posZ);

            let geometry;
            let posY;
            let halfX;
            let halfZ;
            let topY;
            let maxExtent;
            let shapeName;
            let dimsStr;

            if (shapeIdx === 0) {
              const w = 0.6 + rng() * 1.9;
              const h = 0.6 + rng() * 1.9;
              const d = 0.6 + rng() * 1.9;
              geometry = new THREE.BoxGeometry(w, h, d);
              posY = h / 2;
              halfX = w / 2;
              halfZ = d / 2;
              topY = h;
              maxExtent = Math.max(w, h, d);
              shapeName = 'Box';
              dimsStr = `${w.toFixed(2)} × ${h.toFixed(2)} × ${d.toFixed(2)}`;
            } else if (shapeIdx === 1) {
              const r = 0.5 + rng() * 1.0;
              geometry = new THREE.SphereGeometry(r, 16, 12);
              posY = r;
              halfX = r;
              halfZ = r;
              topY = 2 * r;
              maxExtent = 2 * r;
              shapeName = 'Sphere';
              dimsStr = `r=${r.toFixed(2)}`;
            } else if (shapeIdx === 2) {
              const r = 0.4 + rng() * 0.8;
              const h = 0.6 + rng() * 1.9;
              geometry = new THREE.CylinderGeometry(r, r, h, 16);
              posY = h / 2;
              halfX = r;
              halfZ = r;
              topY = h;
              maxExtent = Math.max(2 * r, h);
              shapeName = 'Cylinder';
              dimsStr = `r=${r.toFixed(2)} h=${h.toFixed(2)}`;
            } else {
              const r = 0.4 + rng() * 0.8;
              const h = 0.8 + rng() * 2.2;
              geometry = new THREE.ConeGeometry(r, h, 16);
              posY = h / 2;
              halfX = r;
              halfZ = r;
              topY = h;
              maxExtent = Math.max(2 * r, h);
              shapeName = 'Cone';
              dimsStr = `r=${r.toFixed(2)} h=${h.toFixed(2)}`;
            }

            const aabb = {
              minX: posX - halfX,
              maxX: posX + halfX,
              minZ: posZ - halfZ,
              maxZ: posZ + halfZ,
              topY: baseY + topY,
            };

            const exMinX = aabb.minX - PLAYER_RADIUS;
            const exMaxX = aabb.maxX + PLAYER_RADIUS;
            const exMinZ = aabb.minZ - PLAYER_RADIUS;
            const exMaxZ = aabb.maxZ + PLAYER_RADIUS;
            const cx = Math.max(exMinX, Math.min(SPAWN_X, exMaxX));
            const cz = Math.max(exMinZ, Math.min(SPAWN_Z, exMaxZ));
            const ddx = cx - SPAWN_X;
            const ddz = cz - SPAWN_Z;
            if (ddx * ddx + ddz * ddz < SPAWN_EXCLUSION_RADIUS * SPAWN_EXCLUSION_RADIUS) {
              geometry.dispose();
              continue;
            }

            const pdx2 = posX - pondCenterX;
            const pdz2 = posZ - pondCenterZ;
            if (pdx2 * pdx2 + pdz2 * pdz2 < POND_PROP_KEEPOUT * POND_PROP_KEEPOUT) {
              geometry.dispose();
              continue;
            }

            let overlaps = false;
            for (const p of props) {
              if (
                aabb.minX < p.aabb.maxX &&
                aabb.maxX > p.aabb.minX &&
                aabb.minZ < p.aabb.maxZ &&
                aabb.maxZ > p.aabb.minZ
              ) {
                overlaps = true;
                break;
              }
            }
            if (overlaps) {
              geometry.dispose();
              continue;
            }

            const textureIdx = Math.floor(rng() * 4);
            const baseTexture = baseTextures[textureIdx];
            const tex = baseTexture.clone();
            tex.needsUpdate = true;
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            const repeatVal = Math.max(1, Math.round(maxExtent));
            tex.repeat.set(repeatVal, repeatVal);

            const hue = rng();
            const sat = 0.4 + rng() * 0.4;
            const light = 0.45 + rng() * 0.25;
            const color = new THREE.Color().setHSL(hue, sat, light);
            const roughness = 0.4 + rng() * 0.6;
            const metalness = rng() * 0.3;

            const material = new THREE.MeshStandardMaterial({
              map: tex,
              color,
              roughness,
              metalness,
            });
            material.emissive.setRGB(1, 1, 1);
            material.emissiveIntensity = 0;

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(posX, baseY + posY, posZ);
            mesh.rotation.y = rng() * Math.PI * 2;

            const info = {
              shape: shapeName,
              dims: dimsStr,
              colorHex: '#' + color.getHexString(),
              roughness,
              metalness,
              textureName: TEXTURE_NAMES[textureIdx],
            };

            scene.add(mesh);
            props.push({ mesh, aabb, info, highlightT: 0 });
            placed = true;
          }
        }
      }

      function generateTrees() {
        disposeTrees();
        const treeRng = mulberry32(seed ^ 0x7ee5);
        const targetCount = TREE_COUNT_MIN + Math.floor(treeRng() * TREE_COUNT_RANGE);
        const baseHsl = { h: 0, s: 0, l: 0 };
        TREE_FOLIAGE_BASE_COLOR.getHSL(baseHsl);
        for (let i = 0; i < targetCount; i++) {
          for (let attempt = 0; attempt < TREE_PLACEMENT_ATTEMPTS; attempt++) {
            const trunkRadius = TREE_TRUNK_RADIUS_MIN + treeRng() * TREE_TRUNK_RADIUS_RANGE;
            const trunkHeight = TREE_TRUNK_HEIGHT_MIN + treeRng() * TREE_TRUNK_HEIGHT_RANGE;
            const foliageRadius = TREE_FOLIAGE_RADIUS_MIN + treeRng() * TREE_FOLIAGE_RADIUS_RANGE;
            const foliageHeight = TREE_FOLIAGE_HEIGHT_MIN + treeRng() * TREE_FOLIAGE_HEIGHT_RANGE;
            const posX = -TREE_PLACEMENT_HALF + treeRng() * 2 * TREE_PLACEMENT_HALF;
            const posZ = -TREE_PLACEMENT_HALF + treeRng() * 2 * TREE_PLACEMENT_HALF;

            const sdx = posX - SPAWN_X;
            const sdz = posZ - SPAWN_Z;
            if (sdx * sdx + sdz * sdz < TREE_SPAWN_EXCLUSION * TREE_SPAWN_EXCLUSION) continue;

            const pdx = posX - pondCenterX;
            const pdz = posZ - pondCenterZ;
            if (pdx * pdx + pdz * pdz < TREE_POND_KEEPOUT * TREE_POND_KEEPOUT) continue;

            let overlapsProp = false;
            const propClearance = foliageRadius + TREE_PROP_BUFFER;
            for (const p of props) {
              const cx = Math.max(p.aabb.minX, Math.min(posX, p.aabb.maxX));
              const cz = Math.max(p.aabb.minZ, Math.min(posZ, p.aabb.maxZ));
              const ddx = posX - cx;
              const ddz = posZ - cz;
              if (ddx * ddx + ddz * ddz < propClearance * propClearance) {
                overlapsProp = true;
                break;
              }
            }
            if (overlapsProp) continue;

            let overlapsTree = false;
            for (const t of trees) {
              const ddx = posX - t.centerX;
              const ddz = posZ - t.centerZ;
              const r = foliageRadius + t.foliageRadius + TREE_TREE_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsTree = true;
                break;
              }
            }
            if (overlapsTree) continue;

            const baseY = heightAt(posX, posZ);

            const trunkGeom = new THREE.CylinderGeometry(
              trunkRadius, trunkRadius, trunkHeight, TREE_RADIAL_SEGMENTS,
            );
            const trunkMesh = new THREE.Mesh(trunkGeom, trunkMaterial);
            trunkMesh.position.set(posX, baseY + trunkHeight / 2, posZ);

            const hueShift = (treeRng() - 0.5) * 2 * TREE_FOLIAGE_HUE_VARIANCE;
            const lightShift = (treeRng() - 0.5) * 2 * TREE_FOLIAGE_LIGHT_VARIANCE;
            const foliageColor = new THREE.Color().setHSL(
              (baseHsl.h + hueShift + 1) % 1,
              baseHsl.s,
              Math.max(0, Math.min(1, baseHsl.l + lightShift)),
            );
            const foliageMaterial = new THREE.MeshStandardMaterial({
              color: foliageColor,
              roughness: 0.85,
              metalness: 0.0,
            });
            const foliageGeom = new THREE.ConeGeometry(
              foliageRadius, foliageHeight, TREE_RADIAL_SEGMENTS,
            );
            const foliageMesh = new THREE.Mesh(foliageGeom, foliageMaterial);
            foliageMesh.position.set(
              posX,
              baseY + trunkHeight + foliageHeight / 2,
              posZ,
            );

            scene.add(trunkMesh);
            scene.add(foliageMesh);
            trees.push({
              trunkMesh,
              foliageMesh,
              foliageMaterial,
              centerX: posX,
              centerZ: posZ,
              foliageRadius,
              aabb: {
                minX: posX - foliageRadius,
                maxX: posX + foliageRadius,
                minZ: posZ - foliageRadius,
                maxZ: posZ + foliageRadius,
                topY: Infinity,
              },
            });
            break;
          }
        }
      }

      function generateTargets() {
        disposeTargets();
        capturedCount = 0;
        const targetRng = mulberry32(seed ^ 0x7a76);
        for (let i = 0; i < TARGET_COUNT; i++) {
          for (let attempt = 0; attempt < TARGET_PLACEMENT_ATTEMPTS; attempt++) {
            const posX = -TARGET_PLACEMENT_HALF + targetRng() * 2 * TARGET_PLACEMENT_HALF;
            const posZ = -TARGET_PLACEMENT_HALF + targetRng() * 2 * TARGET_PLACEMENT_HALF;
            const phase = targetRng() * Math.PI * 2;

            const sdx = posX - SPAWN_X;
            const sdz = posZ - SPAWN_Z;
            if (sdx * sdx + sdz * sdz < TARGET_SPAWN_EXCLUSION * TARGET_SPAWN_EXCLUSION) continue;

            const pdx = posX - pondCenterX;
            const pdz = posZ - pondCenterZ;
            if (pdx * pdx + pdz * pdz < TARGET_POND_KEEPOUT * TARGET_POND_KEEPOUT) continue;

            let overlapsProp = false;
            const propClearance = TARGET_RADIUS + TARGET_PROP_BUFFER;
            for (const p of props) {
              const cx = Math.max(p.aabb.minX, Math.min(posX, p.aabb.maxX));
              const cz = Math.max(p.aabb.minZ, Math.min(posZ, p.aabb.maxZ));
              const ddx = posX - cx;
              const ddz = posZ - cz;
              if (ddx * ddx + ddz * ddz < propClearance * propClearance) {
                overlapsProp = true;
                break;
              }
            }
            if (overlapsProp) continue;

            let overlapsTree = false;
            for (const t of trees) {
              const ddx = posX - t.centerX;
              const ddz = posZ - t.centerZ;
              const r = TARGET_RADIUS + t.foliageRadius + TARGET_TREE_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsTree = true;
                break;
              }
            }
            if (overlapsTree) continue;

            let overlapsTarget = false;
            const targetClearance = 2 * TARGET_RADIUS + TARGET_OTHER_BUFFER;
            for (const other of targets) {
              const ddx = posX - other.centerX;
              const ddz = posZ - other.centerZ;
              if (ddx * ddx + ddz * ddz < targetClearance * targetClearance) {
                overlapsTarget = true;
                break;
              }
            }
            if (overlapsTarget) continue;

            const entry = TARGET_CATALOG[i];
            const baseColor = new THREE.Color(entry.color);
            const material = new THREE.MeshBasicMaterial({ color: baseColor.clone() });
            const geometry = new THREE.OctahedronGeometry(TARGET_RADIUS, 0);
            const baseY = heightAt(posX, posZ) + TARGET_HOVER_Y;
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(posX, baseY, posZ);
            scene.add(mesh);
            targets.push({
              mesh,
              baseColor,
              centerX: posX,
              centerZ: posZ,
              baseY,
              phase,
              captured: false,
              catalogIndex: i,
            });
            break;
          }
        }
        updateCatalogCounter();
      }

      function captureTarget(target) {
        target.captured = true;
        target.mesh.material.color.copy(target.baseColor).multiplyScalar(TARGET_CAPTURED_DIM);
        capturedCount++;
        updateCatalogCounter();
        showTargetToast(TARGET_CATALOG[target.catalogIndex]);
      }

      function computeSupportY(x, z) {
        let supportY = heightAt(x, z);
        for (const prop of props) {
          if (
            x > prop.aabb.minX - PLAYER_RADIUS &&
            x < prop.aabb.maxX + PLAYER_RADIUS &&
            z > prop.aabb.minZ - PLAYER_RADIUS &&
            z < prop.aabb.maxZ + PLAYER_RADIUS
          ) {
            if (prop.aabb.topY > supportY) supportY = prop.aabb.topY;
          }
        }
        return supportY;
      }

      function pushOutAxis(axis, dir) {
        if (dir === 0) return;
        const feetY = camera.position.y - EYE_HEIGHT;
        for (const prop of props) {
          const exMinX = prop.aabb.minX - PLAYER_RADIUS;
          const exMaxX = prop.aabb.maxX + PLAYER_RADIUS;
          const exMinZ = prop.aabb.minZ - PLAYER_RADIUS;
          const exMaxZ = prop.aabb.maxZ + PLAYER_RADIUS;
          const px = camera.position.x;
          const pz = camera.position.z;
          if (px <= exMinX || px >= exMaxX || pz <= exMinZ || pz >= exMaxZ) continue;
          if (feetY >= prop.aabb.topY - 0.01) continue;
          if (axis === 'x') {
            if (dir > 0) camera.position.x = exMinX - PUSH_EPS;
            else camera.position.x = exMaxX + PUSH_EPS;
          } else {
            if (dir > 0) camera.position.z = exMinZ - PUSH_EPS;
            else camera.position.z = exMaxZ + PUSH_EPS;
          }
        }
        for (const tree of trees) {
          const exMinX = tree.aabb.minX - PLAYER_RADIUS;
          const exMaxX = tree.aabb.maxX + PLAYER_RADIUS;
          const exMinZ = tree.aabb.minZ - PLAYER_RADIUS;
          const exMaxZ = tree.aabb.maxZ + PLAYER_RADIUS;
          const px = camera.position.x;
          const pz = camera.position.z;
          if (px <= exMinX || px >= exMaxX || pz <= exMinZ || pz >= exMaxZ) continue;
          if (axis === 'x') {
            if (dir > 0) camera.position.x = exMinX - PUSH_EPS;
            else camera.position.x = exMaxX + PUSH_EPS;
          } else {
            if (dir > 0) camera.position.z = exMinZ - PUSH_EPS;
            else camera.position.z = exMaxZ + PUSH_EPS;
          }
        }
      }

      function resetPlayerToSpawn() {
        camera.position.set(SPAWN_X, heightAt(SPAWN_X, SPAWN_Z) + EYE_HEIGHT, SPAWN_Z);
        velocityY = 0;
        isGrounded = true;
        airSpeed = WALK_SPEED;
        jumpQueued = false;
      }

      terrainMesh.geometry.dispose();
      terrainMesh.geometry = buildTerrainGeometry(seed);
      pondMesh = createPondMesh();
      scene.add(pondMesh);
      generate(seed);
      generateTrees();
      generateTargets();

      function animate() {
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();
        const t = (elapsed % DAY_LENGTH) / DAY_LENGTH;
        const theta = t * Math.PI * 2;
        sunDir.set(Math.cos(theta), Math.sin(theta), 0);

        updateSkyColors(t);

        scene.fog.color.copy(skyHorizonColor);
        const fogT = THREE.MathUtils.smoothstep(sunDir.y, FOG_NIGHT_THRESHOLD, FOG_DAY_THRESHOLD);
        scene.fog.near = THREE.MathUtils.lerp(FOG_NIGHT_NEAR, FOG_NOON_NEAR, fogT);
        scene.fog.far = THREE.MathUtils.lerp(FOG_NIGHT_FAR, FOG_NOON_FAR, fogT);

        waterMaterial.uniforms.uTime.value = elapsed;

        skyDome.position.copy(camera.position);
        sunDisc.position.copy(camera.position).addScaledVector(sunDir, SUN_DISTANCE);
        moonDisc.position.copy(camera.position).addScaledVector(sunDir, -SUN_DISTANCE);

        sunDisc.visible = sunDir.y > 0;
        moonDisc.visible = sunDir.y < 0;

        sun.position.copy(sunDir).multiplyScalar(50);
        sun.intensity = Math.max(0, sunDir.y) * 1.0;
        const warmth = Math.max(0, Math.min(1, sunDir.y / 0.3));
        sun.color.copy(warmLightColor).lerp(whiteLightColor, warmth);

        ambientLight.intensity = 0.15 + Math.max(0, sunDir.y) * 0.25;

        stars.position.copy(camera.position);
        stars.rotation.z = theta;
        starMaterial.uniforms.uTime.value = elapsed;
        starMaterial.uniforms.uOpacity.value =
          1 - THREE.MathUtils.smoothstep(sunDir.y, -0.25, -0.05);

        if (regenerateRequested) {
          seed = (seed + 1) | 0;
          terrainMesh.geometry.dispose();
          terrainMesh.geometry = buildTerrainGeometry(seed);
          scene.remove(pondMesh);
          pondMesh.geometry.dispose();
          pondMesh = createPondMesh();
          scene.add(pondMesh);
          generate(seed);
          generateTrees();
          generateTargets();
          resetPlayerToSpawn();
          regenerateRequested = false;
        }

        camera.fov += (targetFov - camera.fov) * Math.min(1, delta * 8);
        camera.updateProjectionMatrix();

        for (const prop of props) {
          prop.highlightT = Math.max(0, prop.highlightT - delta);
          prop.mesh.material.emissiveIntensity =
            (prop.highlightT / HIGHLIGHT_DURATION) * 0.8;
        }

        for (const target of targets) {
          if (target.captured) continue;
          target.mesh.position.y =
            target.baseY +
            TARGET_BOB_AMPLITUDE * Math.sin(elapsed * TARGET_BOB_FREQUENCY + target.phase);
          target.mesh.rotation.y = elapsed * 0.6 + target.phase;
        }

        if (infoTimer > 0) {
          infoTimer -= delta;
          if (infoTimer <= 0) hideInfoCard();
        }

        if (targetToastTimer > 0) {
          targetToastTimer -= delta;
          if (targetToastTimer <= 0) hideTargetToast();
        }

        let forward = 0;
        let right = 0;
        if (controls.isLocked) {
          if (keys['KeyW'] || keys['ArrowUp']) forward += 1;
          if (keys['KeyS'] || keys['ArrowDown']) forward -= 1;
          if (keys['KeyD'] || keys['ArrowRight']) right += 1;
          if (keys['KeyA'] || keys['ArrowLeft']) right -= 1;

          const lenSq = forward * forward + right * right;
          if (lenSq > 1) {
            const len = Math.sqrt(lenSq);
            forward /= len;
            right /= len;
          }

          let speed;
          if (isGrounded) {
            const sprinting = keys['ShiftLeft'] || keys['ShiftRight'];
            speed = sprinting ? WALK_SPEED * SPRINT_MULTIPLIER : WALK_SPEED;
          } else {
            speed = airSpeed * AIR_CONTROL;
          }

          const oldX = camera.position.x;
          const oldZ = camera.position.z;
          if (forward !== 0) controls.moveForward(forward * speed * delta);
          if (right !== 0) controls.moveRight(right * speed * delta);
          const dx = camera.position.x - oldX;
          const dz = camera.position.z - oldZ;

          camera.position.x = oldX + dx;
          camera.position.z = oldZ;
          pushOutAxis('x', Math.sign(dx));
          camera.position.x = Math.max(-HALF_EXTENT, Math.min(HALF_EXTENT, camera.position.x));

          camera.position.z = oldZ + dz;
          pushOutAxis('z', Math.sign(dz));
          camera.position.z = Math.max(-HALF_EXTENT, Math.min(HALF_EXTENT, camera.position.z));

          if (isGrounded && jumpQueued) {
            const groundSpeed = (keys['ShiftLeft'] || keys['ShiftRight'])
              ? WALK_SPEED * SPRINT_MULTIPLIER
              : WALK_SPEED;
            velocityY = JUMP_VELOCITY;
            airSpeed = groundSpeed;
            isGrounded = false;
          }
        }

        jumpQueued = false;

        const supportY = computeSupportY(camera.position.x, camera.position.z);
        const feetY = camera.position.y - EYE_HEIGHT;

        if (isGrounded && supportY < feetY - STEP_DOWN_TOLERANCE) {
          isGrounded = false;
          velocityY = 0;
        }

        if (!isGrounded) {
          velocityY -= GRAVITY * delta;
          camera.position.y += velocityY * delta;
        }

        if (camera.position.y - EYE_HEIGHT <= supportY) {
          camera.position.y = supportY + EYE_HEIGHT;
          velocityY = 0;
          isGrounded = true;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      animate();
    </script>
  </body>
</html>
