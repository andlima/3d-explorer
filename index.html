<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3d-explorer — first-person walk</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
      }
      canvas {
        display: block;
      }
      #lock-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.6);
        color: #f5f5f5;
        font: 16px/1.4 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
        user-select: none;
        z-index: 10;
      }
      #lock-overlay h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }
      #lock-overlay p {
        margin: 0;
        opacity: 0.85;
      }
      #lock-overlay.hidden {
        display: none;
      }
      #viewfinder {
        position: fixed;
        inset: 0;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 4;
      }
      #vf-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          rgba(0, 0, 0, 0) 35%,
          rgba(0, 0, 0, 0.28) 75%,
          rgba(0, 0, 0, 0.6) 100%
        );
      }
      .vf-bracket {
        position: absolute;
        width: 32px;
        height: 32px;
        filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.6));
      }
      .vf-bracket-tl {
        top: 8%;
        left: 8%;
        border-top: 2px solid rgba(255, 255, 255, 0.85);
        border-left: 2px solid rgba(255, 255, 255, 0.85);
      }
      .vf-bracket-tr {
        top: 8%;
        right: 8%;
        border-top: 2px solid rgba(255, 255, 255, 0.85);
        border-right: 2px solid rgba(255, 255, 255, 0.85);
      }
      .vf-bracket-bl {
        bottom: 8%;
        left: 8%;
        border-bottom: 2px solid rgba(255, 255, 255, 0.85);
        border-left: 2px solid rgba(255, 255, 255, 0.85);
      }
      .vf-bracket-br {
        bottom: 8%;
        right: 8%;
        border-bottom: 2px solid rgba(255, 255, 255, 0.85);
        border-right: 2px solid rgba(255, 255, 255, 0.85);
      }
      #vf-reticle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 20px;
        height: 20px;
        margin: -10px 0 0 -10px;
        border: 1.5px solid rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        box-sizing: border-box;
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
      }
      #vf-reticle::before,
      #vf-reticle::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
      }
      #vf-reticle::before {
        top: 50%;
        left: 3px;
        right: 3px;
        height: 2px;
        margin-top: -1px;
      }
      #vf-reticle::after {
        left: 50%;
        top: 3px;
        bottom: 3px;
        width: 2px;
        margin-left: -1px;
      }
      #viewfinder.locked #vf-reticle {
        border-color: #6cff66;
        box-shadow: 0 0 8px rgba(108, 255, 102, 0.6), 0 0 0 1px rgba(0, 0, 0, 0.45);
      }
      #viewfinder.locked #vf-reticle::before,
      #viewfinder.locked #vf-reticle::after {
        background: #6cff66;
      }
      #vf-lock-label {
        position: absolute;
        top: calc(50% + 18px);
        left: 50%;
        transform: translateX(-50%);
        font: bold 11px/1 ui-monospace, monospace;
        color: #6cff66;
        letter-spacing: 2px;
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
        display: none;
      }
      #viewfinder.locked #vf-lock-label {
        display: block;
      }
      #vf-focal {
        position: absolute;
        bottom: 8px;
        left: 8px;
        padding: 4px 8px;
        font: 12px/1 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 3px;
      }
      #vf-failure-toast {
        position: fixed;
        top: calc(50% + 56px);
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 12px;
        font: 12px/1.2 ui-monospace, monospace;
        color: #ffe;
        background: rgba(70, 0, 0, 0.78);
        border: 1px solid rgba(255, 80, 80, 0.65);
        border-radius: 4px;
        letter-spacing: 1px;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 6;
      }
      #cam-indicator {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 4px 8px;
        font: 12px/1 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 3px;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #info-card {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 12px;
        font: 13px/1.5 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 4px;
        white-space: pre;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #catalog-counter {
        position: fixed;
        top: 8px;
        right: 8px;
        padding: 4px 8px;
        font: 12px/1.5 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 3px;
        white-space: pre-line;
        text-align: right;
        pointer-events: none;
        user-select: none;
        z-index: 5;
      }
      #target-toast {
        position: fixed;
        top: 56px;
        right: 8px;
        padding: 6px 10px;
        font: 12px/1.4 ui-monospace, monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.65);
        border-radius: 4px;
        white-space: pre-line;
        text-align: right;
        max-width: 320px;
        pointer-events: none;
        user-select: none;
        display: none;
        z-index: 5;
      }
      #viewfinder.visible,
      #cam-indicator.visible,
      #info-card.visible,
      #target-toast.visible,
      #vf-failure-toast.visible {
        display: block;
      }

      /* --- Mobile touch controls (only active on touch devices) --- */
      #touch-look,
      #touch-controls {
        display: none;
      }
      body.touch-device.mobile-active #touch-look,
      body.touch-device.mobile-active #touch-controls {
        display: block;
      }
      #touch-look {
        position: fixed;
        inset: 0;
        z-index: 3;
        background: transparent;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touch-controls {
        position: fixed;
        inset: 0;
        z-index: 7;
        pointer-events: none;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touch-joystick {
        position: fixed;
        left: 24px;
        bottom: 24px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(255, 255, 255, 0.28);
        pointer-events: auto;
        touch-action: none;
        box-sizing: border-box;
      }
      #touch-joystick-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 52px;
        height: 52px;
        margin: -26px 0 0 -26px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.32);
        border: 2px solid rgba(255, 255, 255, 0.55);
        box-sizing: border-box;
        will-change: transform;
      }
      #touch-buttons {
        position: fixed;
        right: 22px;
        bottom: 24px;
        display: flex;
        flex-direction: column-reverse;
        align-items: flex-end;
        gap: 10px;
        pointer-events: none;
      }
      .touch-btn {
        pointer-events: auto;
        touch-action: none;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 255, 255, 0.45);
        color: #fff;
        font: bold 12px/1 ui-monospace, monospace;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .touch-btn.pressed {
        background: rgba(255, 255, 255, 0.28);
      }
      #touch-sprint.active {
        background: rgba(108, 255, 102, 0.32);
        border-color: #6cff66;
        color: #6cff66;
      }
      #touch-shutter {
        display: none;
        width: 72px;
        height: 72px;
        border-width: 3px;
      }
      #touch-shutter.visible {
        display: flex;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="lock-overlay">
      <h1 id="lock-title">Loading…</h1>
      <p id="lock-status">Loading models…</p>
      <p>WASD / arrows to move &middot; Shift to sprint &middot; Space to jump &middot; R to randomize &middot; C to toggle camera &middot; mouse to look &middot; ESC to release</p>
    </div>
    <div id="viewfinder">
      <div id="vf-vignette"></div>
      <div class="vf-bracket vf-bracket-tl"></div>
      <div class="vf-bracket vf-bracket-tr"></div>
      <div class="vf-bracket vf-bracket-bl"></div>
      <div class="vf-bracket vf-bracket-br"></div>
      <div id="vf-reticle"></div>
      <div id="vf-lock-label">LOCK</div>
      <div id="vf-focal">21mm</div>
    </div>
    <div id="cam-indicator">CAM ON</div>
    <div id="info-card"></div>
    <div id="catalog-counter">Crystals 0 / 0
Creatures 0 / 0</div>
    <div id="target-toast"></div>
    <div id="vf-failure-toast"></div>
    <div id="touch-look"></div>
    <div id="touch-controls">
      <div id="touch-joystick">
        <div id="touch-joystick-knob"></div>
      </div>
      <div id="touch-buttons">
        <div id="touch-jump" class="touch-btn">JUMP</div>
        <div id="touch-sprint" class="touch-btn">SPRINT</div>
        <div id="touch-regen" class="touch-btn">REGEN</div>
        <div id="touch-camera" class="touch-btn">CAM</div>
        <div id="touch-shutter" class="touch-btn">SHOOT</div>
      </div>
    </div>
    <script type="module">
      import * as THREE from 'three';
      import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        200,
      );
      camera.position.set(0, 1.6, 5);
      camera.lookAt(0, 1.6, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const terrainMaterial = new THREE.MeshStandardMaterial({
        color: 0x202428,
        roughness: 0.9,
        metalness: 0.0,
      });
      const terrainMesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), terrainMaterial);
      scene.add(terrainMesh);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
      scene.add(ambientLight);
      const sun = new THREE.DirectionalLight(0xffffff, 1.0);
      sun.position.set(3, 4, 2);
      scene.add(sun);

      const DAY_LENGTH = 60;
      const SKY_RADIUS = 80;
      const SUN_DISTANCE = 75;
      const STAR_RADIUS = 76;
      const STAR_COUNT = 500;

      const skyTopColor = new THREE.Color();
      const skyHorizonColor = new THREE.Color();
      const skyMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTopColor: { value: skyTopColor },
          uHorizonColor: { value: skyHorizonColor },
        },
        vertexShader: /* glsl */ `
          varying vec3 vWorldDir;
          void main() {
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldDir = normalize(worldPos.xyz - cameraPosition);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
          }
        `,
        fragmentShader: /* glsl */ `
          varying vec3 vWorldDir;
          uniform vec3 uTopColor;
          uniform vec3 uHorizonColor;
          void main() {
            float h = smoothstep(0.0, 0.5, normalize(vWorldDir).y);
            gl_FragColor = vec4(mix(uHorizonColor, uTopColor, h), 1.0);
          }
        `,
        side: THREE.BackSide,
        depthWrite: false,
      });
      const skyDome = new THREE.Mesh(new THREE.SphereGeometry(SKY_RADIUS, 32, 16), skyMaterial);
      skyDome.renderOrder = -2;
      scene.add(skyDome);

      const sunDisc = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xffe9a8, depthWrite: false, fog: false }),
      );
      sunDisc.renderOrder = -1;
      scene.add(sunDisc);

      const moonDisc = new THREE.Mesh(
        new THREE.SphereGeometry(1.5, 24, 16),
        new THREE.MeshBasicMaterial({ color: 0xddddee, depthWrite: false, fog: false }),
      );
      moonDisc.renderOrder = -1;
      scene.add(moonDisc);

      const starMaterial = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uOpacity: { value: 0 },
          uPixelRatio: { value: renderer.getPixelRatio() },
        },
        vertexShader: /* glsl */ `
          attribute float aPhase;
          attribute float aFrequency;
          attribute float aSize;
          uniform float uTime;
          uniform float uPixelRatio;
          varying float vTwinkle;
          void main() {
            vTwinkle = 0.65 + 0.35 * sin(uTime * aFrequency + aPhase);
            vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = aSize * uPixelRatio;
            gl_Position = projectionMatrix * mvPos;
          }
        `,
        fragmentShader: /* glsl */ `
          uniform float uOpacity;
          varying float vTwinkle;
          void main() {
            vec2 c = gl_PointCoord - vec2(0.5);
            if (dot(c, c) > 0.25) discard;
            gl_FragColor = vec4(1.0, 1.0, 1.0, uOpacity * vTwinkle);
          }
        `,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      function createStars() {
        const starRng = mulberry32(0xc0ffee);
        const positions = new Float32Array(STAR_COUNT * 3);
        const phases = new Float32Array(STAR_COUNT);
        const frequencies = new Float32Array(STAR_COUNT);
        const sizes = new Float32Array(STAR_COUNT);
        for (let i = 0; i < STAR_COUNT; i++) {
          const u = starRng();
          const v = starRng();
          const phi = 2 * Math.PI * u;
          const cosTheta = 2 * v - 1;
          const sinTheta = Math.sqrt(1 - cosTheta * cosTheta);
          positions[i * 3 + 0] = STAR_RADIUS * sinTheta * Math.cos(phi);
          positions[i * 3 + 1] = STAR_RADIUS * cosTheta;
          positions[i * 3 + 2] = STAR_RADIUS * sinTheta * Math.sin(phi);
          phases[i] = starRng() * Math.PI * 2;
          frequencies[i] = 0.5 + starRng() * 1.5;
          sizes[i] = 1.0 + starRng() * 2.0;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));
        geometry.setAttribute('aFrequency', new THREE.BufferAttribute(frequencies, 1));
        geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
        const points = new THREE.Points(geometry, starMaterial);
        points.name = 'stars';
        points.renderOrder = -1;
        points.frustumCulled = false;
        return points;
      }

      const stars = createStars();
      scene.add(stars);

      const skyKeyframes = [
        { t: 0.0, top: new THREE.Color('#7891B8'), horizon: new THREE.Color('#FF9966') },
        { t: 0.25, top: new THREE.Color('#5BA3DD'), horizon: new THREE.Color('#B0D8F0') },
        { t: 0.5, top: new THREE.Color('#7891B8'), horizon: new THREE.Color('#FF7755') },
        { t: 0.75, top: new THREE.Color('#02061A'), horizon: new THREE.Color('#0F1B40') },
      ];
      const warmLightColor = new THREE.Color('#FFD09E');
      const whiteLightColor = new THREE.Color('#FFFFFF');
      const sunDir = new THREE.Vector3();

      function updateSkyColors(t) {
        const segments = skyKeyframes.length;
        let prevIdx = 0;
        for (let i = 0; i < segments; i++) {
          if (skyKeyframes[i].t <= t) prevIdx = i;
        }
        const prev = skyKeyframes[prevIdx];
        const next = skyKeyframes[(prevIdx + 1) % segments];
        const nextT = next.t > prev.t ? next.t : next.t + 1;
        const u = (t - prev.t) / (nextT - prev.t);
        skyTopColor.copy(prev.top).lerp(next.top, u);
        skyHorizonColor.copy(prev.horizon).lerp(next.horizon, u);
      }

      function mulberry32(a) {
        return function () {
          a |= 0;
          a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const DEFAULT_FOV = 60;
      const MIN_FOV = 20;
      const MAX_FOV = 60;
      // Touch-control tuning (single source of truth; tune after device testing)
      const TOUCH_LOOK_SENSITIVITY = 0.0035;
      const TOUCH_PINCH_FOV_SENSITIVITY = 0.06;
      const JOYSTICK_RADIUS_PX = 55;
      const JOYSTICK_DEADZONE = 8;
      const HIGHLIGHT_DURATION = 0.6;
      const INFO_DURATION = 2.5;
      const CAPTURE_MIN_FRAME_FRACTION = 0.16;
      const FAILURE_TOAST_DURATION = 1.5;
      const VIEWFINDER_SENSOR_HEIGHT_MM = 24;
      const FAILURE_TOAST_MESSAGE = 'OUT OF FRAME — ZOOM IN OR GET CLOSER';

      let cameraMode = false;
      let assetsReady = false;
      let targetFov = DEFAULT_FOV;
      let infoTimer = 0;
      let failureToastTimer = 0;
      let lastFocalMm = -1;

      const aimNdc = new THREE.Vector2(0, 0);
      const raycaster = new THREE.Raycaster();

      const viewfinderEl = document.getElementById('viewfinder');
      const vfFocalEl = document.getElementById('vf-focal');
      const failureToastEl = document.getElementById('vf-failure-toast');
      const camIndicatorEl = document.getElementById('cam-indicator');
      const infoCardEl = document.getElementById('info-card');
      const catalogCounterEl = document.getElementById('catalog-counter');
      const targetToastEl = document.getElementById('target-toast');

      function showInfoCard(info) {
        infoCardEl.textContent = `${info.name}\n${info.flavor}`;
        infoCardEl.classList.add('visible');
        infoTimer = INFO_DURATION;
      }

      function hideInfoCard() {
        infoCardEl.classList.remove('visible');
        infoTimer = 0;
      }

      // Two clearly delineated catalogs: crystals and creatures are counted
      // and displayed independently so the two are never conflated.
      function updateCatalogCounter() {
        catalogCounterEl.textContent =
          `Crystals ${capturedCount} / ${targets.length}\n` +
          `Creatures ${creatureCapturedCount} / ${creatures.length}`;
      }

      function showTargetToast(entry) {
        targetToastEl.textContent = `${entry.name}\n${entry.flavor}`;
        targetToastEl.classList.add('visible');
        targetToastTimer = INFO_DURATION;
      }

      function hideTargetToast() {
        targetToastEl.classList.remove('visible');
        targetToastTimer = 0;
      }

      // `radius` defaults to the crystal TARGET_RADIUS so all existing crystal
      // call sites are unchanged; creatures pass their own bounding radius.
      function isTargetFramed(target, radius = TARGET_RADIUS) {
        const distance = camera.position.distanceTo(target.mesh.position);
        const angularRadius = Math.atan2(radius, distance);
        const halfVFov = (camera.fov * Math.PI / 180) / 2;
        const frameFraction = angularRadius / halfVFov;
        return frameFraction >= CAPTURE_MIN_FRAME_FRACTION;
      }

      function showFailureToast() {
        failureToastEl.textContent = FAILURE_TOAST_MESSAGE;
        failureToastEl.classList.add('visible');
        failureToastTimer = FAILURE_TOAST_DURATION;
      }

      function hideFailureToast() {
        failureToastEl.classList.remove('visible');
        failureToastTimer = 0;
      }

      const controls = new PointerLockControls(camera, document.body);
      const overlay = document.getElementById('lock-overlay');
      const lockTitleEl = document.getElementById('lock-title');
      const lockStatusEl = document.getElementById('lock-status');

      // Touch device detection — gate the entire touch layer behind this so a
      // non-touch device sees no change at all.
      const isTouchDevice =
        ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      let mobileActive = false;
      if (isTouchDevice) document.body.classList.add('touch-device');

      // Single active predicate used everywhere movement/capture was gated on
      // controls.isLocked. On desktop mobileActive is always false, so this is
      // byte-for-byte equivalent to the old controls.isLocked check.
      function isSessionActive() {
        return controls.isLocked || mobileActive;
      }

      // Touch look state is owned by the touch layer. PLC never locks on touch,
      // so its mousemove handler never runs and can't fight these values.
      let touchYaw = 0;
      let touchPitch = 0;
      const TOUCH_PITCH_LIMIT = Math.PI / 2 - 0.1;
      const _touchEuler = new THREE.Euler(0, 0, 0, 'YXZ');
      function syncTouchLookFromCamera() {
        _touchEuler.setFromQuaternion(camera.quaternion, 'YXZ');
        touchYaw = _touchEuler.y;
        touchPitch = _touchEuler.x;
      }
      function applyTouchLook() {
        touchPitch = Math.max(
          -TOUCH_PITCH_LIMIT,
          Math.min(TOUCH_PITCH_LIMIT, touchPitch),
        );
        _touchEuler.set(touchPitch, touchYaw, 0, 'YXZ');
        camera.quaternion.setFromEuler(_touchEuler);
      }

      // Touch DOM refs (present in markup regardless; CSS hides them off-touch).
      const lookEl = document.getElementById('touch-look');
      const joystickEl = document.getElementById('touch-joystick');
      const joystickKnob = document.getElementById('touch-joystick-knob');
      const jumpBtn = document.getElementById('touch-jump');
      const sprintBtn = document.getElementById('touch-sprint');
      const regenBtn = document.getElementById('touch-regen');
      const cameraBtn = document.getElementById('touch-camera');
      const shutterBtn = document.getElementById('touch-shutter');

      overlay.addEventListener('click', () => {

      // Shared camera-mode toggle so the KeyC handler and the touch camera
      // button can never drift apart.
      function toggleCameraMode() {
        cameraMode = !cameraMode;

        camIndicatorEl.classList.toggle('visible', cameraMode);
        if (!cameraMode) {
          targetFov = DEFAULT_FOV;

        shutterBtn.classList.toggle('visible', cameraMode);

      // Shared center-reticle capture decision so mousedown and the shutter
      // button can never drift apart.
      // Props are glTF Groups, so raycasts hit child meshes. Walk up from the
      // hit object to the instance root tagged with userData.propRef.
      function resolvePropFromHit(object) {
        let o = object;
        while (o) {
          if (o.userData && o.userData.propRef) return o.userData.propRef;
          o = o.parent;
        }
        return null;
      }

      // Creatures are cloned glTF Groups too; same parent-walk as props but
      // tagged with userData.creatureRef so the two never cross-resolve.
      function resolveCreatureFromHit(object) {
        let o = object;
        while (o) {
          if (o.userData && o.userData.creatureRef) return o.userData.creatureRef;
          o = o.parent;
        }
        return null;
      }

      function performCapture() {
        raycaster.setFromCamera(aimNdc, camera);
        const hittables = props
          .map((p) => p.mesh)
          .concat(targets.map((t) => t.mesh))
          .concat(creatures.map((c) => c.mesh));
        const hits = raycaster.intersectObjects(hittables, true);
        if (hits.length === 0) return;
        const hitObject = hits[0].object;
        const hitTarget = targets.find((t) => t.mesh === hitObject);
        if (hitTarget) {
          if (hitTarget.captured) return;
          if (isTargetFramed(hitTarget)) {
            captureTarget(hitTarget);
          } else {
            showFailureToast();
          }
          return;
        }
        const hitCreature = resolveCreatureFromHit(hitObject);
        if (hitCreature) {
          if (hitCreature.captured) return;
          if (isTargetFramed(hitCreature, hitCreature.frameRadius)) {
            captureCreature(hitCreature);
          } else {
            showFailureToast();
          }
          return;
        }
        const hitProp = resolvePropFromHit(hitObject);
        if (!hitProp) return;
        hitProp.highlightT = HIGHLIGHT_DURATION;
        showInfoCard(hitProp.info);
      }

      const keys = Object.create(null);

        return keys['ShiftLeft'] || keys['ShiftRight'] || sprintToggle;

      // --- Virtual joystick (lower-left): normalized forward/right in [-1,1] ---
      let joystickActive = false;

      let joyRight = 0;

      let joyCx = 0;
      let joyCy = 0;
      function resetJoystick() {
        joystickActive = false;
        joyForward = 0;
        joyRight = 0;
        joystickPointerId = null;
        joystickKnob.style.transform = 'translate(0px, 0px)';
      }
      function updateJoystick(x, y) {
        const dx = x - joyCx;
        const dy = y - joyCy;
        const dist = Math.hypot(dx, dy);
        if (dist < JOYSTICK_DEADZONE) {
          joyForward = 0;
          joyRight = 0;
          joystickKnob.style.transform = 'translate(0px, 0px)';
          return;
        }
        const mag = Math.min(1, dist / JOYSTICK_RADIUS_PX);
        const ux = dx / dist;
        const uy = dy / dist;
        joyRight = ux * mag;
        joyForward = -uy * mag;
        joystickKnob.style.transform =
          `translate(${ux * mag * JOYSTICK_RADIUS_PX}px, ${uy * mag * JOYSTICK_RADIUS_PX}px)`;
      }

          joystickPointerId = e.pointerId;

          const rect = joystickEl.getBoundingClientRect();
          joyCx = rect.left + rect.width / 2;
          joyCy = rect.top + rect.height / 2;
          joystickActive = true;
          updateJoystick(e.clientX, e.clientY);
        });
        joystickEl.addEventListener('pointermove', (e) => {
          if (e.pointerId !== joystickPointerId) return;
          e.preventDefault();
          updateJoystick(e.clientX, e.clientY);
        });
        const endJoystick = (e) => {
          if (e.pointerId !== joystickPointerId) return;

          if (lookPointers.size === 2) {
            const [a, b] = [...lookPointers.values()];
            pinchPrevDist = Math.hypot(a.x - b.x, a.y - b.y);
          }
        });
        lookEl.addEventListener('pointermove', (e) => {
          const p = lookPointers.get(e.pointerId);
          if (!p) return;
          e.preventDefault();
          const prevX = p.x;
          const prevY = p.y;
          p.x = e.clientX;
          p.y = e.clientY;
          if (lookPointers.size >= 2) {
            // Two fingers down: this is a pinch — suppress look-drag.
            const [a, b] = [...lookPointers.values()];
            const dist = Math.hypot(a.x - b.x, a.y - b.y);
            if (cameraMode) {
              // Pinch out (distance grows) => zoom in => narrower FOV.
              targetFov = Math.max(

                Math.min(
                  MAX_FOV,
                  targetFov - (dist - pinchPrevDist) * TOUCH_PINCH_FOV_SENSITIVITY,

              );

            return;

          touchYaw -= (e.clientX - prevX) * TOUCH_LOOK_SENSITIVITY;

        });

          if (!lookPointers.has(e.pointerId)) return;
          e.preventDefault();
          lookPointers.delete(e.pointerId);

            const [a, b] = [...lookPointers.values()];
            pinchPrevDist = Math.hypot(a.x - b.x, a.y - b.y);

      // --- Wildlife (creature capture targets) ----------------------------
      // A parallel catalog to TARGET_CATALOG. Each species' `file` is loaded

      // by generateCreatures(). `weight` is the rarity weight used by the

      // if the GLB fails to load (identical fallback path as props).
      const CREATURE_COUNT = 9;
      const CREATURE_SPAWN_EXCLUSION = 5.0;
      const CREATURE_POND_KEEPOUT = 6.0;
      const CREATURE_PROP_BUFFER = 0.6;
      const CREATURE_TREE_BUFFER = 0.8;
      const CREATURE_OTHER_BUFFER = 1.6;
      const CREATURE_PLACEMENT_HALF = 22.0;
      const CREATURE_PLACEMENT_ATTEMPTS = 30;

      const CREATURE_BOB_AMPLITUDE = 0.05;
      const CREATURE_BOB_FREQUENCY = 1.6;
      const CREATURE_SWAY_AMPLITUDE = 0.07;
      const CREATURE_CATALOG = [
        {
          key: 'wl_deer', file: 'wildlife/deer.glb', name: 'Woodland Deer',
          flavor: 'Antlered and watchful, it holds the clearing like it owns it.',
          footprint: 1.8, weight: 1, fallbackColor: 0x9c6b3f,
        },
        {
          key: 'wl_fox', file: 'wildlife/fox.glb', name: 'Russet Fox',
          flavor: 'A flame-bright coat and a tail that writes its own trail.',
          footprint: 1.1, weight: 2, fallbackColor: 0xcf6a26,
        },
        {
          key: 'wl_rabbit', file: 'wildlife/rabbit.glb', name: 'Meadow Rabbit',
          flavor: 'Long-eared and still — gone the instant you blink.',
          footprint: 0.6, weight: 4, fallbackColor: 0xa19f9c,

      const CREATURE_WEIGHT_TOTAL = CREATURE_CATALOG.reduce(
        (s, c) => s + c.weight,
        0,
      );
      // Seeded weighted pick: rng() in [0,1) → a CREATURE_CATALOG index,
      // biased by `weight` so rarer species appear less often.
      function pickCreatureIndex(r) {
        let x = r * CREATURE_WEIGHT_TOTAL;
        for (let i = 0; i < CREATURE_CATALOG.length; i++) {
          x -= CREATURE_CATALOG[i].weight;
          if (x <= 0) return i;
        }
        return CREATURE_CATALOG.length - 1;

          uTime: { value: 0 },
          uHorizonColor: { value: skyHorizonColor },
          uBaseColor: { value: POND_BASE_COLOR },
          uOpacity: { value: POND_OPACITY },
          uWaveAmplitude: { value: POND_WAVE_AMPLITUDE },
        },
        vertexShader: /* glsl */ `
          uniform float uTime;
          uniform float uWaveAmplitude;
          varying vec3 vWorldPos;
          varying vec2 vUv;
          void main() {
            vec3 pos = position;
            pos.y += uWaveAmplitude * (
              sin(uTime * 1.5 + pos.x * 0.8)
              + cos(uTime * 1.2 + pos.z * 0.7)
            );
            vec4 worldPos = modelMatrix * vec4(pos, 1.0);
            vWorldPos = worldPos.xyz;
            vUv = uv;
            gl_Position = projectionMatrix * viewMatrix * worldPos;
          }
        `,
        fragmentShader: /* glsl */ `
          uniform vec3 uBaseColor;
          uniform vec3 uHorizonColor;
          uniform float uOpacity;
          uniform float uTime;
          varying vec3 vWorldPos;
          varying vec2 vUv;
          void main() {
            vec3 viewDir = normalize(cameraPosition - vWorldPos);
            float fresnel = pow(1.0 - max(viewDir.y, 0.0), 3.0);
            vec3 col = mix(uBaseColor, uHorizonColor, fresnel);
            float ripple = 0.5 + 0.5 * sin(uTime * 2.0 + vUv.x * 30.0)
                                      * cos(uTime * 1.5 + vUv.y * 30.0);
            col += 0.05 * ripple;
            gl_FragColor = vec4(col, uOpacity);
          }
        `,
        side: THREE.DoubleSide,
        transparent: true,

      // --- Model asset pipeline -------------------------------------------
      // Build-free: GLBs are committed under assets/ and served same-origin.
      // Each model is fetched/parsed exactly once at startup; placed props
      // clone from the cache (geometry is shared with the cache; materials
      // are cloned per instance so highlight state is isolated).
      const MODEL_DEFS = [
        { key: 'rock', file: 'rock.glb', name: 'Mossy Rock',
          flavor: 'Weathered stone — a quiet landmark.',
          footprint: 1.3, fallbackColor: 0x77787a },
        { key: 'log', file: 'log.glb', name: 'Fallen Log',
          flavor: 'A toppled trunk slowly returning to the soil.',
          footprint: 2.3, fallbackColor: 0x6b4a2b },
        { key: 'mushroom', file: 'mushroom.glb', name: 'Forest Mushroom',
          flavor: 'A red-capped fungus thriving in the shade.',
          footprint: 0.8, fallbackColor: 0xc0392b },
        { key: 'stump', file: 'stump.glb', name: 'Tree Stump',
          flavor: 'All that remains of an old forest giant.',
          footprint: 1.1, fallbackColor: 0x5c3a1e },
        { key: 'crystal_cluster', file: 'crystal_cluster.glb', name: 'Crystal Cluster',
          flavor: 'Faceted shards humming with faint light.',
          footprint: 1.2, fallbackColor: 0x6c5ce7 },
      ];
      const modelCache = new Map();
      const _tmpVec3 = new THREE.Vector3();

      // Props and creatures are loaded through this single mechanism so there
      // is no second, parallel asset-loading path. Both MODEL_DEFS and
      // CREATURE_CATALOG entries share the { key, file } shape and the same
      // cache, progress overlay, and procedural fallback.
      const PRELOAD_DEFS = MODEL_DEFS.concat(CREATURE_CATALOG);

      function preloadModels(onProgress) {
        const loader = new GLTFLoader();
        const total = PRELOAD_DEFS.length;
        let done = 0;
        onProgress(0, total);
        return Promise.all(
          PRELOAD_DEFS.map(
            (def) =>
              new Promise((resolve) => {
                loader.load(
                  `assets/models/${def.file}`,
                  (gltf) => {
                    modelCache.set(def.key, gltf.scene);
                    done += 1;
                    onProgress(done, total);
                    resolve();
                  },
                  undefined,
                  (err) => {
                    console.warn(
                      `[model-asset-pipeline] Failed to load assets/models/${def.file}; ` +
                        'falling back to a procedural primitive for this asset.',
                      err,
                    );
                    modelCache.set(def.key, null);
                    done += 1;
                    onProgress(done, total);
                    resolve();
                  },
                );
              }),
          ),
        );
      }

      // Returns { root, materials, ownedGeometries }. For a cached model the
      // root is a clone (shared geometry, per-instance cloned materials, so
      // ownedGeometries is empty). On load failure a procedural primitive is
      // built so the scene stays fully playable offline / on asset failure.
      function buildPropInstance(def) {
        const src = modelCache.get(def.key);
        if (src) {
          const root = src.clone(true);
          const materials = [];
          root.traverse((o) => {
            if (o.isMesh) {
              o.material = o.material.clone();
              o.material.emissive.setRGB(1, 1, 1);
              o.material.emissiveIntensity = 0;
              materials.push(o.material);
            }
          });
          return { root, materials, ownedGeometries: [] };
        }
        const geometry = new THREE.IcosahedronGeometry(0.5, 0);
        const material = new THREE.MeshStandardMaterial({
          color: def.fallbackColor,
          roughness: 0.9,
          metalness: 0.0,
        });
        material.emissive.setRGB(1, 1, 1);
        material.emissiveIntensity = 0;
        const mesh = new THREE.Mesh(geometry, material);
        const root = new THREE.Group();
        root.add(mesh);
        return { root, materials: [material], ownedGeometries: [geometry] };
      }

      function disposePropInstance(built) {
        for (const m of built.materials) m.dispose();
        for (const g of built.ownedGeometries) g.dispose();
      }

      function disposeProps() {
        for (const prop of props) {
          scene.remove(prop.mesh);
          // Per-instance clones only: cloned materials (every prop) and any
          // geometry the instance owns (fallback primitives). The shared
          // cached gltf.scene geometry/materials are never disposed.
          for (const m of prop.materials) m.dispose();
          for (const g of prop.ownedGeometries) g.dispose();
        }
        props.length = 0;
      }

      function disposeTrees() {
        for (const tree of trees) {
          scene.remove(tree.trunkMesh);
          scene.remove(tree.foliageMesh);
          tree.trunkMesh.geometry.dispose();
          tree.foliageMesh.geometry.dispose();
          tree.foliageMaterial.dispose();
        }
        trees.length = 0;
      }

      function disposeTargets() {
        for (const target of targets) {
          scene.remove(target.mesh);
          target.mesh.geometry.dispose();
          target.mesh.material.dispose();
        }
        targets.length = 0;
      }

      function disposeCreatures() {
        for (const creature of creatures) {
          scene.remove(creature.mesh);
          // Same discipline as disposeProps(): dispose only the per-instance
          // cloned materials and any geometry the fallback primitive owns.
          // The shared cached gltf.scene is never disposed, so R can rebuild
          // creatures from the cache with no refetch.
          for (const m of creature.materials) m.dispose();
          for (const g of creature.ownedGeometries) g.dispose();
        }
        creatures.length = 0;
      }

      const heightGrid = new Float32Array(TERRAIN_GRID * TERRAIN_GRID);

      function heightAt(x, z) {
        const gx = THREE.MathUtils.clamp(
          ((x + 25) / 50) * (TERRAIN_GRID - 1),
          0,
          TERRAIN_GRID - 1,
        );
        const gz = THREE.MathUtils.clamp(
          ((z + 25) / 50) * (TERRAIN_GRID - 1),
          0,
          TERRAIN_GRID - 1,
        );
        const x0 = Math.floor(gx);
        const z0 = Math.floor(gz);
        const x1 = Math.min(x0 + 1, TERRAIN_GRID - 1);
        const z1 = Math.min(z0 + 1, TERRAIN_GRID - 1);
        const fx = gx - x0;
        const fz = gz - z0;
        const fxs = fx * fx * (3 - 2 * fx);
        const fzs = fz * fz * (3 - 2 * fz);
        const v00 = heightGrid[z0 * TERRAIN_GRID + x0];
        const v10 = heightGrid[z0 * TERRAIN_GRID + x1];
        const v01 = heightGrid[z1 * TERRAIN_GRID + x0];
        const v11 = heightGrid[z1 * TERRAIN_GRID + x1];
        const v0 = v00 * (1 - fxs) + v10 * fxs;
        const v1 = v01 * (1 - fxs) + v11 * fxs;
        const raw = v0 * (1 - fzs) + v1 * fzs;
        const dx = x - SPAWN_X;
        const dz = z - SPAWN_Z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const mask = THREE.MathUtils.smoothstep(dist, SPAWN_FLAT_RADIUS, SPAWN_FALLOFF_RADIUS);
        const terrain = raw * TERRAIN_AMPLITUDE * mask;
        const pdx = x - pondCenterX;
        const pdz = z - pondCenterZ;
        const pondDist = Math.sqrt(pdx * pdx + pdz * pdz);
        if (pondDist >= POND_RADIUS) return terrain;
        const bowlT = 1 - THREE.MathUtils.smoothstep(pondDist, 0, POND_RADIUS);
        return THREE.MathUtils.lerp(terrain, POND_FLOOR_Y, bowlT);
      }

      function placePond(seedVal) {
        const pondRng = mulberry32(seedVal ^ 0xb0a7);
        for (let attempt = 0; attempt < 50; attempt++) {
          const x = -POND_PLACEMENT_HALF + pondRng() * 2 * POND_PLACEMENT_HALF;
          const z = -POND_PLACEMENT_HALF + pondRng() * 2 * POND_PLACEMENT_HALF;
          const dx = x - SPAWN_X;
          const dz = z - SPAWN_Z;
          if (dx * dx + dz * dz >= POND_SPAWN_MIN_DIST * POND_SPAWN_MIN_DIST) {
            pondCenterX = x;
            pondCenterZ = z;
            return;
          }
        }
        pondCenterX = -15;
        pondCenterZ = -10;
      }

      function buildTerrainGeometry(seedVal) {
        placePond(seedVal);
        const terrainRng = mulberry32(seedVal ^ 0xa11ce);
        for (let i = 0; i < TERRAIN_GRID * TERRAIN_GRID; i++) {
          heightGrid[i] = terrainRng() * 2 - 1;
        }
        const geometry = new THREE.PlaneGeometry(50, 50, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS);
        geometry.rotateX(-Math.PI / 2);
        const positions = geometry.attributes.position;
        for (let i = 0; i < positions.count; i++) {
          const vx = positions.getX(i);
          const vz = positions.getZ(i);
          positions.setY(i, heightAt(vx, vz));
        }
        geometry.computeVertexNormals();
        return geometry;
      }

      function generate(newSeed) {
        disposeProps();
        seed = newSeed;
        rng = mulberry32(seed);

        const targetCount = 15 + Math.floor(rng() * 16);
        for (let i = 0; i < targetCount; i++) {
          for (let attempt = 0; attempt < 30; attempt++) {
            const def = MODEL_DEFS[Math.floor(rng() * MODEL_DEFS.length)];
            const posX = -22 + rng() * 44;
            const posZ = -22 + rng() * 44;
            const rotY = rng() * Math.PI * 2;
            const baseY = heightAt(posX, posZ);

            const built = buildPropInstance(def);
            const root = built.root;

            // Normalize: uniform-scale to the target footprint, apply the
            // random Y rotation, then ground the lowest point on the terrain.
            root.position.set(0, 0, 0);
            root.rotation.set(0, 0, 0);
            root.scale.set(1, 1, 1);
            root.updateMatrixWorld(true);
            const rawSize = new THREE.Box3()
              .setFromObject(root)
              .getSize(_tmpVec3);
            const maxHoriz = Math.max(rawSize.x, rawSize.z) || 1;
            root.scale.setScalar(def.footprint / maxHoriz);
            root.rotation.y = rotY;
            root.updateMatrixWorld(true);
            const localBox = new THREE.Box3().setFromObject(root);
            root.position.set(posX, baseY - localBox.min.y, posZ);
            root.updateMatrixWorld(true);
            const worldBox = new THREE.Box3().setFromObject(root);

            // Recomputed from normalized world bounds; same shape as before so
            // computeSupportY()/pushOutAxis() keep working unchanged.
            const aabb = {
              minX: worldBox.min.x,
              maxX: worldBox.max.x,
              minZ: worldBox.min.z,
              maxZ: worldBox.max.z,
              topY: worldBox.max.y,
            };

            const exMinX = aabb.minX - PLAYER_RADIUS;
            const exMaxX = aabb.maxX + PLAYER_RADIUS;
            const exMinZ = aabb.minZ - PLAYER_RADIUS;
            const exMaxZ = aabb.maxZ + PLAYER_RADIUS;
            const cx = Math.max(exMinX, Math.min(SPAWN_X, exMaxX));
            const cz = Math.max(exMinZ, Math.min(SPAWN_Z, exMaxZ));
            const ddx = cx - SPAWN_X;
            const ddz = cz - SPAWN_Z;
            if (ddx * ddx + ddz * ddz < SPAWN_EXCLUSION_RADIUS * SPAWN_EXCLUSION_RADIUS) {
              disposePropInstance(built);
              continue;
            }

            const pdx2 = posX - pondCenterX;
            const pdz2 = posZ - pondCenterZ;
            if (pdx2 * pdx2 + pdz2 * pdz2 < POND_PROP_KEEPOUT * POND_PROP_KEEPOUT) {
              disposePropInstance(built);
              continue;
            }

            let overlaps = false;
            for (const p of props) {
              if (
                aabb.minX < p.aabb.maxX &&
                aabb.maxX > p.aabb.minX &&
                aabb.minZ < p.aabb.maxZ &&
                aabb.maxZ > p.aabb.minZ
              ) {
                overlaps = true;
                break;
              }
            }
            if (overlaps) {
              disposePropInstance(built);
              continue;
            }

            const prop = {
              mesh: root,
              aabb,
              info: { name: def.name, flavor: def.flavor },
              highlightT: 0,
              materials: built.materials,
              ownedGeometries: built.ownedGeometries,
            };
            root.userData.propRef = prop;
            scene.add(root);
            props.push(prop);
            break;
          }
        }
      }

      function generateTrees() {
        disposeTrees();
        const treeRng = mulberry32(seed ^ 0x7ee5);
        const targetCount = TREE_COUNT_MIN + Math.floor(treeRng() * TREE_COUNT_RANGE);
        const baseHsl = { h: 0, s: 0, l: 0 };
        TREE_FOLIAGE_BASE_COLOR.getHSL(baseHsl);
        for (let i = 0; i < targetCount; i++) {
          for (let attempt = 0; attempt < TREE_PLACEMENT_ATTEMPTS; attempt++) {
            const trunkRadius = TREE_TRUNK_RADIUS_MIN + treeRng() * TREE_TRUNK_RADIUS_RANGE;
            const trunkHeight = TREE_TRUNK_HEIGHT_MIN + treeRng() * TREE_TRUNK_HEIGHT_RANGE;
            const foliageRadius = TREE_FOLIAGE_RADIUS_MIN + treeRng() * TREE_FOLIAGE_RADIUS_RANGE;
            const foliageHeight = TREE_FOLIAGE_HEIGHT_MIN + treeRng() * TREE_FOLIAGE_HEIGHT_RANGE;
            const posX = -TREE_PLACEMENT_HALF + treeRng() * 2 * TREE_PLACEMENT_HALF;
            const posZ = -TREE_PLACEMENT_HALF + treeRng() * 2 * TREE_PLACEMENT_HALF;

            const sdx = posX - SPAWN_X;
            const sdz = posZ - SPAWN_Z;
            if (sdx * sdx + sdz * sdz < TREE_SPAWN_EXCLUSION * TREE_SPAWN_EXCLUSION) continue;

            const pdx = posX - pondCenterX;
            const pdz = posZ - pondCenterZ;
            if (pdx * pdx + pdz * pdz < TREE_POND_KEEPOUT * TREE_POND_KEEPOUT) continue;

            let overlapsProp = false;
            const propClearance = foliageRadius + TREE_PROP_BUFFER;
            for (const p of props) {
              const cx = Math.max(p.aabb.minX, Math.min(posX, p.aabb.maxX));
              const cz = Math.max(p.aabb.minZ, Math.min(posZ, p.aabb.maxZ));
              const ddx = posX - cx;
              const ddz = posZ - cz;
              if (ddx * ddx + ddz * ddz < propClearance * propClearance) {
                overlapsProp = true;
                break;
              }
            }
            if (overlapsProp) continue;

            let overlapsTree = false;
            for (const t of trees) {
              const ddx = posX - t.centerX;
              const ddz = posZ - t.centerZ;
              const r = foliageRadius + t.foliageRadius + TREE_TREE_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsTree = true;
                break;
              }
            }
            if (overlapsTree) continue;

            const baseY = heightAt(posX, posZ);

            const trunkGeom = new THREE.CylinderGeometry(
              trunkRadius, trunkRadius, trunkHeight, TREE_RADIAL_SEGMENTS,
            );
            const trunkMesh = new THREE.Mesh(trunkGeom, trunkMaterial);
            trunkMesh.position.set(posX, baseY + trunkHeight / 2, posZ);

            const hueShift = (treeRng() - 0.5) * 2 * TREE_FOLIAGE_HUE_VARIANCE;
            const lightShift = (treeRng() - 0.5) * 2 * TREE_FOLIAGE_LIGHT_VARIANCE;
            const foliageColor = new THREE.Color().setHSL(
              (baseHsl.h + hueShift + 1) % 1,
              baseHsl.s,
              Math.max(0, Math.min(1, baseHsl.l + lightShift)),
            );
            const foliageMaterial = new THREE.MeshStandardMaterial({
              color: foliageColor,
              roughness: 0.85,
              metalness: 0.0,
            });
            const foliageGeom = new THREE.ConeGeometry(
              foliageRadius, foliageHeight, TREE_RADIAL_SEGMENTS,
            );
            const foliageMesh = new THREE.Mesh(foliageGeom, foliageMaterial);
            foliageMesh.position.set(
              posX,
              baseY + trunkHeight + foliageHeight / 2,
              posZ,
            );

            scene.add(trunkMesh);
            scene.add(foliageMesh);
            trees.push({
              trunkMesh,
              foliageMesh,
              foliageMaterial,
              centerX: posX,
              centerZ: posZ,
              foliageRadius,
              aabb: {
                minX: posX - foliageRadius,
                maxX: posX + foliageRadius,
                minZ: posZ - foliageRadius,
                maxZ: posZ + foliageRadius,
                topY: Infinity,
              },
            });
            break;
          }
        }
      }

      function generateTargets() {
        disposeTargets();
        capturedCount = 0;
        const targetRng = mulberry32(seed ^ 0x7a76);
        for (let i = 0; i < TARGET_COUNT; i++) {
          for (let attempt = 0; attempt < TARGET_PLACEMENT_ATTEMPTS; attempt++) {
            const posX = -TARGET_PLACEMENT_HALF + targetRng() * 2 * TARGET_PLACEMENT_HALF;
            const posZ = -TARGET_PLACEMENT_HALF + targetRng() * 2 * TARGET_PLACEMENT_HALF;
            const phase = targetRng() * Math.PI * 2;

            const sdx = posX - SPAWN_X;
            const sdz = posZ - SPAWN_Z;
            if (sdx * sdx + sdz * sdz < TARGET_SPAWN_EXCLUSION * TARGET_SPAWN_EXCLUSION) continue;

            const pdx = posX - pondCenterX;
            const pdz = posZ - pondCenterZ;
            if (pdx * pdx + pdz * pdz < TARGET_POND_KEEPOUT * TARGET_POND_KEEPOUT) continue;

            let overlapsProp = false;
            const propClearance = TARGET_RADIUS + TARGET_PROP_BUFFER;
            for (const p of props) {
              const cx = Math.max(p.aabb.minX, Math.min(posX, p.aabb.maxX));
              const cz = Math.max(p.aabb.minZ, Math.min(posZ, p.aabb.maxZ));
              const ddx = posX - cx;
              const ddz = posZ - cz;
              if (ddx * ddx + ddz * ddz < propClearance * propClearance) {
                overlapsProp = true;
                break;
              }
            }
            if (overlapsProp) continue;

            let overlapsTree = false;
            for (const t of trees) {
              const ddx = posX - t.centerX;
              const ddz = posZ - t.centerZ;
              const r = TARGET_RADIUS + t.foliageRadius + TARGET_TREE_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsTree = true;
                break;
              }
            }
            if (overlapsTree) continue;

            let overlapsTarget = false;
            const targetClearance = 2 * TARGET_RADIUS + TARGET_OTHER_BUFFER;
            for (const other of targets) {
              const ddx = posX - other.centerX;
              const ddz = posZ - other.centerZ;
              if (ddx * ddx + ddz * ddz < targetClearance * targetClearance) {
                overlapsTarget = true;
                break;
              }
            }
            if (overlapsTarget) continue;

            const entry = TARGET_CATALOG[i];
            const baseColor = new THREE.Color(entry.color);
            const material = new THREE.MeshBasicMaterial({ color: baseColor.clone() });
            const geometry = new THREE.OctahedronGeometry(TARGET_RADIUS, 0);
            const baseY = heightAt(posX, posZ) + TARGET_HOVER_Y;
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(posX, baseY, posZ);
            scene.add(mesh);
            targets.push({
              mesh,
              baseColor,
              centerX: posX,
              centerZ: posZ,
              baseY,
              phase,
              captured: false,
              catalogIndex: i,
            });
            break;
          }
        }
        updateCatalogCounter();
      }

      function captureTarget(target) {
        target.captured = true;
        target.mesh.material.color.copy(target.baseColor).multiplyScalar(TARGET_CAPTURED_DIM);
        capturedCount++;
        updateCatalogCounter();
        showTargetToast(TARGET_CATALOG[target.catalogIndex]);
      }

      // Places creatures deterministically from the world seed, grounded on
      // the terrain, honoring spawn-exclusion, pond keep-out, and
      // prop/tree/crystal/creature clearance. Mirrors generateTargets()'s
      // structure and reuses generate()'s normalize-and-ground approach plus
      // the shared model-asset pipeline (buildPropInstance).
      function generateCreatures() {
        disposeCreatures();
        creatureCapturedCount = 0;
        const creatureRng = mulberry32(seed ^ 0x6c1f7);
        for (let i = 0; i < CREATURE_COUNT; i++) {
          for (let attempt = 0; attempt < CREATURE_PLACEMENT_ATTEMPTS; attempt++) {
            const catalogIndex = pickCreatureIndex(creatureRng());
            const def = CREATURE_CATALOG[catalogIndex];
            const posX = -CREATURE_PLACEMENT_HALF + creatureRng() * 2 * CREATURE_PLACEMENT_HALF;
            const posZ = -CREATURE_PLACEMENT_HALF + creatureRng() * 2 * CREATURE_PLACEMENT_HALF;
            const rotY = creatureRng() * Math.PI * 2;
            const phase = creatureRng() * Math.PI * 2;

            const sdx = posX - SPAWN_X;
            const sdz = posZ - SPAWN_Z;
            if (sdx * sdx + sdz * sdz < CREATURE_SPAWN_EXCLUSION * CREATURE_SPAWN_EXCLUSION) continue;

            const pdx = posX - pondCenterX;
            const pdz = posZ - pondCenterZ;
            if (pdx * pdx + pdz * pdz < CREATURE_POND_KEEPOUT * CREATURE_POND_KEEPOUT) continue;

            // Build + normalize exactly as generate() does for props: uniform
            // scale to the footprint, apply the random Y rotation, then ground
            // the lowest point on the terrain.
            const built = buildPropInstance(def);
            const root = built.root;
            root.position.set(0, 0, 0);
            root.rotation.set(0, 0, 0);
            root.scale.set(1, 1, 1);
            root.updateMatrixWorld(true);
            const rawSize = new THREE.Box3().setFromObject(root).getSize(_tmpVec3);
            const maxHoriz = Math.max(rawSize.x, rawSize.z) || 1;
            root.scale.setScalar(def.footprint / maxHoriz);
            root.rotation.y = rotY;
            root.updateMatrixWorld(true);
            const localBox = new THREE.Box3().setFromObject(root);
            const baseY = heightAt(posX, posZ);
            root.position.set(posX, baseY - localBox.min.y, posZ);
            root.updateMatrixWorld(true);
            const worldBox = new THREE.Box3().setFromObject(root);
            const size = worldBox.getSize(_tmpVec3);
            const radius = 0.5 * Math.max(size.x, size.z);
            const frameRadius = 0.5 * Math.max(size.x, size.y, size.z);

            let overlapsProp = false;
            for (const p of props) {
              const cx = Math.max(p.aabb.minX, Math.min(posX, p.aabb.maxX));
              const cz = Math.max(p.aabb.minZ, Math.min(posZ, p.aabb.maxZ));
              const ddx = posX - cx;
              const ddz = posZ - cz;
              const clr = radius + CREATURE_PROP_BUFFER;
              if (ddx * ddx + ddz * ddz < clr * clr) {
                overlapsProp = true;
                break;
              }
            }
            if (overlapsProp) {
              disposePropInstance(built);
              continue;
            }

            let overlapsTree = false;
            for (const t of trees) {
              const ddx = posX - t.centerX;
              const ddz = posZ - t.centerZ;
              const r = radius + t.foliageRadius + CREATURE_TREE_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsTree = true;
                break;
              }
            }
            if (overlapsTree) {
              disposePropInstance(built);
              continue;
            }

            let overlapsTarget = false;
            for (const other of targets) {
              const ddx = posX - other.centerX;
              const ddz = posZ - other.centerZ;
              const r = radius + TARGET_RADIUS + CREATURE_OTHER_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsTarget = true;
                break;
              }
            }
            if (overlapsTarget) {
              disposePropInstance(built);
              continue;
            }

            let overlapsCreature = false;
            for (const other of creatures) {
              const ddx = posX - other.centerX;
              const ddz = posZ - other.centerZ;
              const r = radius + other.radius + CREATURE_OTHER_BUFFER;
              if (ddx * ddx + ddz * ddz < r * r) {
                overlapsCreature = true;
                break;
              }
            }
            if (overlapsCreature) {
              disposePropInstance(built);
              continue;
            }

            const creature = {
              mesh: root,
              materials: built.materials,
              ownedGeometries: built.ownedGeometries,
              centerX: posX,
              centerZ: posZ,
              baseY: root.position.y,
              baseRotY: rotY,
              radius,
              frameRadius,
              phase,
              captured: false,
              catalogIndex,
            };
            root.userData.creatureRef = creature;
            scene.add(root);
            creatures.push(creature);
            break;
          }
        }
        updateCatalogCounter();
      }

      function captureCreature(creature) {
        creature.captured = true;
        for (const m of creature.materials) {
          m.color.multiplyScalar(CREATURE_CAPTURED_DIM);
        }
        creature.mesh.position.y = creature.baseY;
        creature.mesh.rotation.y = creature.baseRotY;
        creatureCapturedCount++;
        updateCatalogCounter();
        showTargetToast(CREATURE_CATALOG[creature.catalogIndex]);
      }

      function computeSupportY(x, z) {
        let supportY = heightAt(x, z);
        for (const prop of props) {
          if (
            x > prop.aabb.minX - PLAYER_RADIUS &&
            x < prop.aabb.maxX + PLAYER_RADIUS &&
            z > prop.aabb.minZ - PLAYER_RADIUS &&
            z < prop.aabb.maxZ + PLAYER_RADIUS
          ) {
            if (prop.aabb.topY > supportY) supportY = prop.aabb.topY;
          }
        }
        return supportY;
      }

      function pushOutAxis(axis, dir) {
        if (dir === 0) return;
        const feetY = camera.position.y - EYE_HEIGHT;
        for (const prop of props) {
          const exMinX = prop.aabb.minX - PLAYER_RADIUS;
          const exMaxX = prop.aabb.maxX + PLAYER_RADIUS;
          const exMinZ = prop.aabb.minZ - PLAYER_RADIUS;
          const exMaxZ = prop.aabb.maxZ + PLAYER_RADIUS;
          const px = camera.position.x;
          const pz = camera.position.z;
          if (px <= exMinX || px >= exMaxX || pz <= exMinZ || pz >= exMaxZ) continue;
          if (feetY >= prop.aabb.topY - 0.01) continue;
          if (axis === 'x') {
            if (dir > 0) camera.position.x = exMinX - PUSH_EPS;
            else camera.position.x = exMaxX + PUSH_EPS;
          } else {
            if (dir > 0) camera.position.z = exMinZ - PUSH_EPS;
            else camera.position.z = exMaxZ + PUSH_EPS;
          }
        }
        for (const tree of trees) {
          const exMinX = tree.aabb.minX - PLAYER_RADIUS;
          const exMaxX = tree.aabb.maxX + PLAYER_RADIUS;
          const exMinZ = tree.aabb.minZ - PLAYER_RADIUS;
          const exMaxZ = tree.aabb.maxZ + PLAYER_RADIUS;
          const px = camera.position.x;
          const pz = camera.position.z;
          if (px <= exMinX || px >= exMaxX || pz <= exMinZ || pz >= exMaxZ) continue;
          if (axis === 'x') {
            if (dir > 0) camera.position.x = exMinX - PUSH_EPS;
            else camera.position.x = exMaxX + PUSH_EPS;
          } else {
            if (dir > 0) camera.position.z = exMinZ - PUSH_EPS;
            else camera.position.z = exMaxZ + PUSH_EPS;
          }
        }
      }

      function resetPlayerToSpawn() {
        camera.position.set(SPAWN_X, heightAt(SPAWN_X, SPAWN_Z) + EYE_HEIGHT, SPAWN_Z);
        velocityY = 0;
        isGrounded = true;
        airSpeed = WALK_SPEED;
        jumpQueued = false;
      }

      terrainMesh.geometry.dispose();
      terrainMesh.geometry = buildTerrainGeometry(seed);
      pondMesh = createPondMesh();
      scene.add(pondMesh);

      // Asset preloading must resolve (load or fall back) before the first
      // generate() runs and before the lock overlay enables start.
      preloadModels((loaded, total) => {
        lockStatusEl.textContent =
          loaded < total
            ? `Loading models… ${loaded} / ${total}`
            : 'Finalizing…';
      }).then(() => {
        generate(seed);
        generateTrees();
        generateTargets();
        generateCreatures();
        assetsReady = true;
        lockTitleEl.textContent = 'Click to play';
        lockStatusEl.textContent = 'Models ready';
        animate();
      });

      function animate() {
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();
        const t = (elapsed % DAY_LENGTH) / DAY_LENGTH;
        const theta = t * Math.PI * 2;
        sunDir.set(Math.cos(theta), Math.sin(theta), 0);

        updateSkyColors(t);

        scene.fog.color.copy(skyHorizonColor);
        const fogT = THREE.MathUtils.smoothstep(sunDir.y, FOG_NIGHT_THRESHOLD, FOG_DAY_THRESHOLD);
        scene.fog.near = THREE.MathUtils.lerp(FOG_NIGHT_NEAR, FOG_NOON_NEAR, fogT);
        scene.fog.far = THREE.MathUtils.lerp(FOG_NIGHT_FAR, FOG_NOON_FAR, fogT);

        waterMaterial.uniforms.uTime.value = elapsed;

        skyDome.position.copy(camera.position);
        sunDisc.position.copy(camera.position).addScaledVector(sunDir, SUN_DISTANCE);
        moonDisc.position.copy(camera.position).addScaledVector(sunDir, -SUN_DISTANCE);

        sunDisc.visible = sunDir.y > 0;
        moonDisc.visible = sunDir.y < 0;

        sun.position.copy(sunDir).multiplyScalar(50);
        sun.intensity = Math.max(0, sunDir.y) * 1.0;
        const warmth = Math.max(0, Math.min(1, sunDir.y / 0.3));
        sun.color.copy(warmLightColor).lerp(whiteLightColor, warmth);

        ambientLight.intensity = 0.15 + Math.max(0, sunDir.y) * 0.25;

        stars.position.copy(camera.position);
        stars.rotation.z = theta;
        starMaterial.uniforms.uTime.value = elapsed;
        starMaterial.uniforms.uOpacity.value =
          1 - THREE.MathUtils.smoothstep(sunDir.y, -0.25, -0.05);

        if (regenerateRequested) {
          seed = (seed + 1) | 0;
          terrainMesh.geometry.dispose();
          terrainMesh.geometry = buildTerrainGeometry(seed);
          scene.remove(pondMesh);
          pondMesh.geometry.dispose();
          pondMesh = createPondMesh();
          scene.add(pondMesh);
          generate(seed);
          generateTrees();
          generateTargets();
          generateCreatures();
          resetPlayerToSpawn();
          // Re-sync touch look to the reset orientation and release the
          // joystick so nothing is left stale (mirrors desktop KeyR, which
          // leaves look untouched). No-ops on desktop.
          syncTouchLookFromCamera();
          resetJoystick();
          regenerateRequested = false;
        }

        camera.fov += (targetFov - camera.fov) * Math.min(1, delta * 8);
        camera.updateProjectionMatrix();

        const focalMm = Math.round(
          VIEWFINDER_SENSOR_HEIGHT_MM /
            (2 * Math.tan((camera.fov * Math.PI / 180) / 2)),
        );
        if (focalMm !== lastFocalMm) {
          lastFocalMm = focalMm;
          vfFocalEl.textContent = `${focalMm}mm`;
        }

        let focusLocked = false;
        if (cameraMode) {
          raycaster.setFromCamera(aimNdc, camera);
          const hittables = props
            .map((p) => p.mesh)
            .concat(targets.map((t) => t.mesh))
            .concat(creatures.map((c) => c.mesh));
          const hits = raycaster.intersectObjects(hittables, true);
          if (hits.length > 0) {
            const hitObject = hits[0].object;
            const hitTarget = targets.find((t) => t.mesh === hitObject);
            if (hitTarget && !hitTarget.captured && isTargetFramed(hitTarget)) {
              focusLocked = true;
            } else {
              const hitCreature = resolveCreatureFromHit(hitObject);
              if (
                hitCreature &&
                !hitCreature.captured &&
                isTargetFramed(hitCreature, hitCreature.frameRadius)
              ) {
                focusLocked = true;
              }
            }
          }
        }
        viewfinderEl.classList.toggle('locked', focusLocked);

        for (const prop of props) {
          prop.highlightT = Math.max(0, prop.highlightT - delta);
          const emissiveIntensity = (prop.highlightT / HIGHLIGHT_DURATION) * 0.8;
          for (const m of prop.materials) m.emissiveIntensity = emissiveIntensity;
        }

        for (const target of targets) {
          if (target.captured) continue;
          target.mesh.position.y =
            target.baseY +
            TARGET_BOB_AMPLITUDE * Math.sin(elapsed * TARGET_BOB_FREQUENCY + target.phase);
          target.mesh.rotation.y = elapsed * 0.6 + target.phase;
        }

        // Subtle, non-AI idle: a small grounded bob plus a gentle yaw sway
        // around the placement rotation (no locomotion/pathing). No per-frame
        // allocation — scalars only, mirroring the crystal bob above.
        for (const creature of creatures) {
          if (creature.captured) continue;
          creature.mesh.position.y =
            creature.baseY +
            CREATURE_BOB_AMPLITUDE *
              Math.sin(elapsed * CREATURE_BOB_FREQUENCY + creature.phase);
          creature.mesh.rotation.y =
            creature.baseRotY +
            CREATURE_SWAY_AMPLITUDE * Math.sin(elapsed * 0.5 + creature.phase);
        }

        if (infoTimer > 0) {
          infoTimer -= delta;
          if (infoTimer <= 0) hideInfoCard();
        }

        if (targetToastTimer > 0) {
          targetToastTimer -= delta;
          if (targetToastTimer <= 0) hideTargetToast();
        }

        if (failureToastTimer > 0) {
          failureToastTimer -= delta;
          if (failureToastTimer <= 0) hideFailureToast();
        }

        let forward = 0;
        let right = 0;
        if (isSessionActive()) {
          if (joystickActive) {
            // Joystick supplies the forward/right inputs the keyboard
            // otherwise supplies; keyboard path stays intact for desktop.
            forward = joyForward;
            right = joyRight;
          } else {
            if (keys['KeyW'] || keys['ArrowUp']) forward += 1;
            if (keys['KeyS'] || keys['ArrowDown']) forward -= 1;
            if (keys['KeyD'] || keys['ArrowRight']) right += 1;
            if (keys['KeyA'] || keys['ArrowLeft']) right -= 1;
          }

          const lenSq = forward * forward + right * right;
          if (lenSq > 1) {
            const len = Math.sqrt(lenSq);
            forward /= len;
            right /= len;
          }

          let speed;
          if (isGrounded) {
            speed = isSprinting() ? WALK_SPEED * SPRINT_MULTIPLIER : WALK_SPEED;
          } else {
            speed = airSpeed * AIR_CONTROL;
          }

          const oldX = camera.position.x;
          const oldZ = camera.position.z;
          if (forward !== 0) controls.moveForward(forward * speed * delta);
          if (right !== 0) controls.moveRight(right * speed * delta);
          const dx = camera.position.x - oldX;
          const dz = camera.position.z - oldZ;

          camera.position.x = oldX + dx;
          camera.position.z = oldZ;
          pushOutAxis('x', Math.sign(dx));
          camera.position.x = Math.max(-HALF_EXTENT, Math.min(HALF_EXTENT, camera.position.x));

          camera.position.z = oldZ + dz;
          pushOutAxis('z', Math.sign(dz));
          camera.position.z = Math.max(-HALF_EXTENT, Math.min(HALF_EXTENT, camera.position.z));

          if (isGrounded && jumpQueued) {
            const groundSpeed = isSprinting()
              ? WALK_SPEED * SPRINT_MULTIPLIER
              : WALK_SPEED;
            velocityY = JUMP_VELOCITY;
            airSpeed = groundSpeed;
            isGrounded = false;
          }
        }

        jumpQueued = false;

        const supportY = computeSupportY(camera.position.x, camera.position.z);
        const feetY = camera.position.y - EYE_HEIGHT;

        if (isGrounded && supportY < feetY - STEP_DOWN_TOLERANCE) {
          isGrounded = false;
          velocityY = 0;
        }

        if (!isGrounded) {
          velocityY -= GRAVITY * delta;
          camera.position.y += velocityY * delta;
        }

        if (camera.position.y - EYE_HEIGHT <= supportY) {
          camera.position.y = supportY + EYE_HEIGHT;
          velocityY = 0;
          isGrounded = true;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }
      // animate() is started by preloadModels().then(...) above, once asset
      // loading has resolved and the first generate() has run.
    </script>
  </body>
</html>
